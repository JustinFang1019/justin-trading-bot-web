<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Justin Trading Bot Web</title>
  <style>
    :root {
      --bg: #eef2f7;
      --surface: #ffffff;
      --ink: #182230;
      --muted: #667085;
      --line: #d9e1ec;
      --navy: #17172d;
      --blue: #1d4ed8;
      --blue-soft: #dbeafe;
      --green: #047857;
      --green-soft: #dcfce7;
      --red: #b42318;
      --red-soft: #fee2e2;
      --amber: #a16207;
      --amber-soft: #fef3c7;
      --purple: #6d28d9;
      --purple-soft: #ede9fe;
      --shadow: 0 12px 30px rgba(16, 24, 40, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input { font: inherit; }

    .app {
      max-width: 960px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 12px 10px 84px;
    }

    .topbar {
      align-items: center;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 20px;
      line-height: 1.25;
      margin: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin: 3px 0 0;
    }

    .status-pill {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 118px;
      padding: 8px 9px;
      text-align: right;
    }

    .status-pill strong {
      display: block;
      font-size: 12px;
    }

    .status-pill span {
      color: var(--muted);
      display: block;
      font-size: 10px;
      margin-top: 2px;
    }

    .toolbar {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    .search {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: flex;
      overflow: hidden;
    }

    .search input {
      background: transparent;
      border: 0;
      color: var(--ink);
      outline: 0;
      padding: 11px 12px;
      width: 100%;
    }

    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .filters button,
    .icon-btn,
    .card-button {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #475467;
      cursor: pointer;
      white-space: nowrap;
    }

    .filters button {
      padding: 8px 11px;
    }

    .filters button.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .view { display: none; }
    .view.active { display: block; }

    .feed {
      display: grid;
      gap: 10px;
    }

    .line-card,
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(16, 24, 40, .04);
      overflow: hidden;
    }

    .line-card.selected {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(29, 78, 216, .12);
    }

    .card-head {
      background: var(--navy);
      color: #fff;
      padding: 11px 12px;
    }

    .card-title {
      align-items: baseline;
      display: flex;
      gap: 7px;
      justify-content: space-between;
    }

    .card-title strong {
      font-size: 18px;
      line-height: 1.2;
    }

    .score {
      color: #facc15;
      font-size: 12px;
      font-weight: 800;
    }

    .signal-line {
      color: #c7d2fe;
      display: flex;
      font-size: 12px;
      gap: 8px;
      justify-content: space-between;
      line-height: 1.35;
      margin-top: 4px;
    }

    .card-body {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .quote-row,
    .info-row {
      background: #f8fafc;
      border-radius: 7px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      padding: 7px;
    }

    .info-row {
      grid-template-columns: 84px minmax(0, 1fr);
    }

    .cell small,
    .info-row small {
      color: var(--muted);
      display: block;
      font-size: 11px;
    }

    .cell strong,
    .info-row strong {
      color: var(--ink);
      display: block;
      font-size: 14px;
      line-height: 1.25;
      margin-top: 2px;
      overflow-wrap: anywhere;
    }

    .pills {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }

    .pill {
      border-radius: 7px;
      min-height: 48px;
      padding: 7px;
    }

    .pill small {
      display: block;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .pill strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .pill.entry { background: var(--blue-soft); color: #1e3a8a; }
    .pill.rr { background: var(--green-soft); color: #14532d; }
    .pill.rs { background: #e0f2fe; color: #075985; }

    .card-actions {
      display: grid;
      gap: 7px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .card-button {
      color: var(--blue);
      font-size: 13px;
      font-weight: 800;
      min-height: 38px;
      padding: 8px 4px;
      text-align: center;
    }

    .card-button.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .flex-card {
      box-shadow: var(--shadow);
      margin: 0;
    }

    .flex-box {
      display: flex;
      gap: 6px;
    }

    .flex-box.vertical { flex-direction: column; }
    .flex-box.horizontal { align-items: stretch; flex-direction: row; }

    .flex-text {
      color: #344054;
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .flex-text.lg,
    .flex-text.xl { font-size: 16px; }
    .flex-text.md { font-size: 14px; }
    .flex-text.xs,
    .flex-text.xxs { font-size: 11px; }
    .flex-text.bold { font-weight: 800; }

    .panel-head {
      align-items: center;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 900;
    }

    .panel-sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      margin-top: 3px;
    }

    .panel-body {
      padding: 12px;
    }

    .badge {
      border-radius: 999px;
      display: inline-flex;
      font-size: 12px;
      font-weight: 800;
      padding: 5px 8px;
    }

    .badge.green { background: var(--green-soft); color: var(--green); }
    .badge.blue { background: var(--blue-soft); color: var(--blue); }
    .badge.amber { background: var(--amber-soft); color: var(--amber); }
    .badge.red { background: var(--red-soft); color: var(--red); }

    .chart-wrap {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      height: 320px;
      overflow: hidden;
    }

    canvas {
      display: block;
      height: 100%;
      width: 100%;
    }

    .detail-grid,
    .status-grid,
    .warrant-list {
      display: grid;
      gap: 10px;
    }

    .warrant-row,
    .status-row {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .warrant-row strong,
    .status-row strong {
      display: block;
      font-size: 14px;
    }

    .meta {
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      line-height: 1.45;
      margin-top: 5px;
    }

    .message {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      line-height: 1.6;
      padding: 16px;
      text-align: center;
    }

    .text-summary {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #344054;
      font-family: Consolas, "Microsoft JhengHei", monospace;
      font-size: 12px;
      line-height: 1.55;
      margin-top: 10px;
      padding: 10px;
      white-space: pre-wrap;
    }

    .bottom-nav {
      background: rgba(255,255,255,.97);
      border-top: 1px solid var(--line);
      bottom: 0;
      box-shadow: 0 -8px 22px rgba(16, 24, 40, .08);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      left: 0;
      position: fixed;
      right: 0;
      z-index: 20;
    }

    .bottom-nav button {
      background: transparent;
      border: 0;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      padding: 9px 4px 10px;
    }

    .bottom-nav button strong {
      display: block;
      font-size: 16px;
      line-height: 1;
      margin-bottom: 3px;
    }

    .bottom-nav button.active {
      color: var(--blue);
      font-weight: 900;
    }

    @media (min-width: 760px) {
      .toolbar {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
      }

      .feed {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-grid {
        grid-template-columns: minmax(0, 1.35fr) minmax(280px, .65fr);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">掃描小卡</h1>
        <p class="sub" id="pageSub">直接使用原 LINE bot 掃描結果與小卡欄位，Web 只做手機瀏覽與延伸資訊。</p>
      </div>
      <div class="status-pill">
        <strong id="syncTitle">連線中</strong>
        <span id="syncMeta">讀取原 bot</span>
      </div>
    </header>

    <div class="toolbar">
      <label class="search" aria-label="搜尋股票">
        <input id="searchInput" placeholder="搜尋代號或名稱">
      </label>
      <div class="filters">
        <button class="active" data-filter="all">全部</button>
        <button data-filter="START">START</button>
        <button data-filter="CONT">CONT</button>
        <button data-filter="rs90">RS 90+</button>
        <button data-filter="repeat">連續</button>
      </div>
    </div>

    <section class="view active" id="scanView">
      <div class="feed" id="cardFeed">
        <div class="message">正在讀取原 LINE bot 掃描小卡...</div>
      </div>
    </section>

    <section class="view" id="chartView">
      <div class="detail-grid">
        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title" id="chartTitle">K 線</div>
              <div class="panel-sub" id="chartSub">使用原 bot /kbar 快取繪製，Yahoo 只保留為外部備援。</div>
            </div>
            <a class="badge blue" id="yahooLink" target="_blank" rel="noopener">Yahoo</a>
          </div>
          <div class="panel-body">
            <div class="chart-wrap"><canvas id="chart" width="720" height="360"></canvas></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">策略資訊</div>
              <div class="panel-sub">這裡只展示掃描結果，不重新計算策略。</div>
            </div>
          </div>
          <div class="panel-body" id="detailBody"></div>
        </div>
      </div>
    </section>

    <section class="view" id="warrantView">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title" id="warrantTitle">權證</div>
            <div class="panel-sub">讀取原 bot Top 3 權證快取，不從 Web 端重算。</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="warrant-list" id="warrantList"></div>
        </div>
      </div>
    </section>

    <section class="view" id="statusView">
      <div class="status-grid" id="statusList"></div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="主選單">
    <button class="active" data-view="scanView"><strong>01</strong>小卡</button>
    <button data-view="chartView"><strong>02</strong>K線</button>
    <button data-view="warrantView"><strong>03</strong>權證</button>
    <button data-view="statusView"><strong>04</strong>狀態</button>
  </nav>

  <script>
    const API_BASE = "https://stock-scanner-bot-f3kt.onrender.com/api/web";
    let stocks = [];
    let selected = null;
    let filter = "all";
    let kbarById = new Map();
    let statusPayload = null;
    let scanBubbles = [];

    const $ = id => document.getElementById(id);

    function num(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function html(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    async function getJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.json();
    }

    function mapStock(row) {
      const close = num(row.close);
      const p1 = num(row.p1, num(row.high_close, close * 1.06));
      const p2 = row.p2 == null ? null : num(row.p2);
      const boxLow = num(row.box_low, close * .94);
      const type = row.strategy_type || "START";
      return {
        raw: row,
        id: String(row.stock_id || ""),
        name: row.stock_name || String(row.stock_id || ""),
        type,
        signal: row.cross_status || row.detail || type,
        dataLabel: row.data_label || row.date || "",
        close,
        k: num(row.K),
        d: num(row.D),
        gap: num(row.gap),
        score: num(row.score),
        rs: row.rs_rank == null ? null : num(row.rs_rank),
        days: num(row.consecutive_days, 1),
        pattern: row.pattern_type || row.detail || type,
        detail: row.detail || "",
        entry: type === "CONT"
          ? `箱頂 ${row.box_high || "-"} 附近`
          : `${(close * .97).toFixed(1)}-${(close * .99).toFixed(1)}`,
        rr: row.rr_display || row.rr_ratio || "依原卡",
        stop: row.stop_loss || boxLow,
        p1,
        p2,
        flex: null,
        text: "",
        warrants: null
      };
    }

    function filteredStocks() {
      const q = $("searchInput").value.trim().toLowerCase();
      return stocks.filter(s => {
        const queryOk = !q || s.id.includes(q) || s.name.toLowerCase().includes(q);
        const filterOk =
          filter === "all" ||
          s.type === filter ||
          (filter === "rs90" && (s.rs || 0) >= 90) ||
          (filter === "repeat" && s.days >= 2);
        return queryOk && filterOk;
      });
    }

    function cardActions(stock) {
      return `
        <div class="card-actions">
          <button class="card-button primary" data-action="chart" data-id="${stock.id}">K線</button>
          <button class="card-button primary" data-action="warrant" data-id="${stock.id}">權證</button>
          <button class="card-button primary" data-action="financial" data-id="${stock.id}">財報</button>
          <button class="card-button" data-action="realtime" data-id="${stock.id}">即時</button>
          <button class="card-button" data-action="backtest" data-id="${stock.id}">回測</button>
          <button class="card-button" data-action="watch" data-id="${stock.id}">+自選</button>
        </div>
      `;
    }

    function flexStyle(node = {}) {
      const css = [];
      if (node.backgroundColor) css.push(`background:${node.backgroundColor}`);
      if (node.color) css.push(`color:${node.color}`);
      if (node.paddingAll) css.push(`padding:${node.paddingAll}`);
      if (node.margin && node.margin !== "none") css.push("margin-top:6px");
      if (node.cornerRadius) css.push(`border-radius:${node.cornerRadius}`);
      if (node.borderColor) css.push(`border-color:${node.borderColor}`);
      if (node.borderWidth) css.push(`border-style:solid;border-width:${node.borderWidth}`);
      if (node.flex != null) css.push(`flex:${node.flex}`);
      if (node.align === "center") css.push("text-align:center");
      if (node.align === "end") css.push("text-align:right");
      return css.length ? ` style="${css.join(";")}"` : "";
    }

    function flexNode(node, sid = "") {
      if (!node) return "";
      if (node.type === "text") {
        const cls = ["flex-text", node.size || "xs", node.weight === "bold" ? "bold" : ""].filter(Boolean).join(" ");
        return `<div class="${cls}"${flexStyle(node)}>${html(node.text)}</div>`;
      }
      if (node.type === "separator") return `<div style="border-top:1px solid var(--line);"></div>`;
      if (node.type === "button") {
        const action = node.action || {};
        const label = action.label || action.text || action.uri || "Action";
        const actionType =
          label.includes("K") ? "chart" :
          label.includes("權證") ? "warrant" :
          label.includes("財報") ? "financial" :
          label.includes("即時") ? "realtime" :
          label.includes("回測") ? "backtest" :
          label.includes("自選") || label.includes("+") ? "watch" : "link";
        return `<button class="card-button ${node.style === "primary" ? "primary" : ""}" data-action="${actionType}" data-id="${sid}" data-uri="${html(action.uri || "")}" data-text="${html(action.text || "")}"${flexStyle(node)}>${html(label)}</button>`;
      }
      if (node.type === "box") {
        return `<div class="flex-box ${node.layout || "vertical"}"${flexStyle(node)}>${(node.contents || []).map(child => flexNode(child, sid)).join("")}</div>`;
      }
      if (node.type === "bubble") {
        return `<div class="line-card flex-card">
          ${node.header ? flexNode(node.header, sid) : ""}
          ${node.body ? flexNode(node.body, sid) : ""}
          ${node.footer ? flexNode(node.footer, sid) : ""}
        </div>`;
      }
      return "";
    }

    function stockIdFromBubble(bubble) {
      const texts = [];
      const walk = node => {
        if (!node) return;
        if (node.type === "text" && node.text) texts.push(String(node.text));
        (node.contents || []).forEach(walk);
        if (node.header) walk(node.header);
        if (node.body) walk(node.body);
        if (node.footer) walk(node.footer);
      };
      walk(bubble);
      const match = texts.join(" ").match(/\b\d{4}\b/);
      return match ? match[0] : "";
    }

    function scanCard(stock) {
      return `
        <article class="line-card ${selected?.id === stock.id ? "selected" : ""}" data-id="${stock.id}">
          <div class="card-head">
            <div class="card-title">
              <strong>${html(stock.id)} ${html(stock.name)}</strong>
              <span class="score">${stock.score} 分</span>
            </div>
            <div class="signal-line">
              <span>${html(stock.signal)}</span>
              <span>${html(stock.dataLabel)}</span>
            </div>
          </div>
          <div class="card-body">
            <div class="quote-row">
              <div class="cell"><small>收盤</small><strong>${stock.close}</strong></div>
              <div class="cell"><small>K值</small><strong>${stock.k.toFixed(1)}</strong></div>
              <div class="cell"><small>D值</small><strong>${stock.d.toFixed(1)}</strong></div>
              <div class="cell"><small>差值</small><strong>${stock.gap.toFixed(1)}</strong></div>
            </div>
            <div class="pills">
              <div class="pill entry"><small>進場</small><strong>${html(stock.entry)}</strong></div>
              <div class="pill rr"><small>風報</small><strong>${html(stock.rr)}</strong></div>
              <div class="pill rs"><small>RS</small><strong>${stock.rs ?? "-"}</strong></div>
            </div>
            <div class="info-row"><small>型態</small><strong>${html(stock.pattern)}</strong></div>
            <div class="info-row"><small>停損/壓力</small><strong>${html(stock.stop)} / ${html(stock.p1)}${stock.p2 ? ` / ${html(stock.p2)}` : ""}</strong></div>
            ${cardActions(stock)}
          </div>
        </article>
      `;
    }

    function renderFeed() {
      const rows = filteredStocks();
      $("cardFeed").innerHTML = rows.length
        ? rows.map(scanCard).join("")
        : `<div class="message">沒有符合條件的小卡。若這裡是空的，請看狀態頁的 API 錯誤。</div>`;
    }

    function renderOriginalFeed() {
      const rows = filteredStocks();
      const allowed = new Set(rows.map(stock => stock.id));
      const bubbles = scanBubbles.filter(item => allowed.has(item.id));
      $("cardFeed").innerHTML = bubbles.length
        ? bubbles.map(item => `<article data-id="${item.id}" class="${selected?.id === item.id ? "selected" : ""}">${flexNode(item.bubble, item.id)}</article>`).join("")
        : rows.length
          ? rows.map(scanCard).join("")
          : `<div class="message">沒有符合條件的小卡。若這裡是空的，請看狀態頁的 API 錯誤。</div>`;
    }

    function activate(viewId) {
      document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === viewId));
      document.querySelectorAll(".bottom-nav button").forEach(b => b.classList.toggle("active", b.dataset.view === viewId));
      const titleMap = {
        scanView: ["掃描小卡", "直接使用原 LINE bot 掃描結果與小卡欄位。"],
        chartView: ["K 線", "使用原 bot /kbar 快取繪製，Yahoo 只保留為外部備援。"],
        warrantView: ["權證", "讀取原 bot Top 3 權證快取。"],
        statusView: ["狀態", "部署、API、cache 與 read-only 狀態。"]
      };
      $("pageTitle").textContent = titleMap[viewId][0];
      $("pageSub").textContent = titleMap[viewId][1];
      if (viewId === "chartView") drawChart();
    }

    async function loadExtras(stock) {
      if (!stock) return;
      const [card, kbar, warrants] = await Promise.allSettled([
        getJson(`${API_BASE}/stock/${stock.id}/card`),
        getJson(`${API_BASE}/stock/${stock.id}/kbar?limit=180`),
        getJson(`${API_BASE}/stock/${stock.id}/warrants`)
      ]);
      if (card.status === "fulfilled" && card.value?.data) {
        stock.flex = card.value.data.flex_messages || null;
        stock.text = card.value.data.text_summary || "";
      }
      if (kbar.status === "fulfilled" && kbar.value?.data?.records) {
        kbarById.set(stock.id, kbar.value.data.records);
      }
      if (warrants.status === "fulfilled" && warrants.value?.data) {
        stock.warrants = warrants.value.data.candidates || [];
      }
    }

    function renderDetail() {
      if (!selected) return;
      $("chartTitle").textContent = `${selected.id} ${selected.name}`;
      $("yahooLink").href = `https://tw.stock.yahoo.com/quote/${selected.id}/technical-analysis`;
      $("detailBody").innerHTML = `
        <div class="status-row"><strong>${html(selected.signal)}</strong><div class="meta"><span>${html(selected.detail)}</span></div></div>
        <div class="status-row"><strong>進場 / 風報</strong><div class="meta"><span>${html(selected.entry)}</span><span>${html(selected.rr)}</span></div></div>
        <div class="status-row"><strong>停損 / 壓力</strong><div class="meta"><span>${html(selected.stop)}</span><span>${html(selected.p1)}</span><span>${selected.p2 ? html(selected.p2) : ""}</span></div></div>
        ${selected.text ? `<div class="text-summary">${html(selected.text)}</div>` : ""}
      `;
      drawChart();
    }

    function drawChart() {
      const canvas = $("chart");
      if (!canvas || !selected) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, w, h);

      const rows = (kbarById.get(selected.id) || []).slice(-80).map(r => ({
        open: num(r.open), high: num(r.high), low: num(r.low), close: num(r.close)
      })).filter(r => r.high && r.low);

      if (!rows.length) {
        ctx.fillStyle = "#667085";
        ctx.font = "18px Microsoft JhengHei, Arial";
        ctx.fillText("尚未取得 K 線快取", 32, 52);
        return;
      }

      const max = Math.max(...rows.map(r => r.high), selected.p1 || 0, selected.p2 || 0);
      const min = Math.min(...rows.map(r => r.low), selected.stop || rows[0].low);
      const yOf = value => h - 28 - ((value - min) / Math.max(1, max - min)) * (h - 62);
      const step = (w - 60) / rows.length;
      const bodyW = Math.max(3, Math.min(8, step * .48));

      ctx.strokeStyle = "#e5e7eb";
      for (let i = 0; i < 5; i++) {
        const y = 28 + i * ((h - 60) / 4);
        ctx.beginPath();
        ctx.moveTo(28, y);
        ctx.lineTo(w - 22, y);
        ctx.stroke();
      }

      [[selected.stop, "#b42318"], [selected.p1, "#1d4ed8"], [selected.p2, "#6d28d9"]].forEach(([value, color]) => {
        if (!value) return;
        const y = yOf(value);
        ctx.setLineDash([6, 5]);
        ctx.strokeStyle = color;
        ctx.beginPath();
        ctx.moveTo(30, y);
        ctx.lineTo(w - 24, y);
        ctx.stroke();
        ctx.setLineDash([]);
      });

      rows.forEach((r, i) => {
        const x = 32 + i * step;
        const up = r.close >= r.open;
        ctx.strokeStyle = up ? "#b42318" : "#047857";
        ctx.fillStyle = up ? "#fee2e2" : "#dcfce7";
        ctx.beginPath();
        ctx.moveTo(x, yOf(r.high));
        ctx.lineTo(x, yOf(r.low));
        ctx.stroke();
        const top = yOf(Math.max(r.open, r.close));
        const bottom = yOf(Math.min(r.open, r.close));
        ctx.fillRect(x - bodyW / 2, top, bodyW, Math.max(3, bottom - top));
        ctx.strokeRect(x - bodyW / 2, top, bodyW, Math.max(3, bottom - top));
      });

      ctx.fillStyle = "#475467";
      ctx.font = "14px Microsoft JhengHei, Arial";
      ctx.fillText(`${selected.id} ${selected.name} / bot Kbar cache`, 30, 20);
    }

    function renderWarrants() {
      if (!selected) return;
      $("warrantTitle").textContent = `${selected.id} ${selected.name} 權證`;
      const rows = selected.warrants || [];
      $("warrantList").innerHTML = rows.length ? rows.map((w, index) => `
        <div class="warrant-row">
          <strong>${html(w.code || w.warrant_id || w.stock_id || `Top ${index + 1}`)} ${html(w.name || w.warrant_name || "")}</strong>
          <div class="meta">
            <span>價格 ${html(w.price || w.close || "-")}</span>
            <span>Delta ${html(w.delta ?? w.Delta ?? "-")}</span>
            <span>槓桿 ${html(w.leverage || w.effective_leverage || "-")}</span>
            <span>履約 ${html(w.strike_price || w.strike || "-")}</span>
          </div>
        </div>
      `).join("") : `<div class="message">目前沒有 Top 3 權證快取，或原 bot 判定無合適候選。</div>`;
    }

    function renderStatus(error = null) {
      const rows = [
        ["API", error ? `失敗：${error.message}` : "已連線 Render read-only API", error ? "red" : "green"],
        ["掃描資料", `${stocks.length} 檔`, stocks.length ? "green" : "amber"],
        ["K 線", selected ? `${selected.id} ${kbarById.has(selected.id) ? "已載入" : "未載入"}` : "尚未選股", kbarById.has(selected?.id) ? "green" : "amber"],
        ["寫入功能", "自選與管理動作等待 LIFF/auth；目前只讀", "amber"]
      ];
      if (statusPayload) {
        rows.push(["Backend", `Kbar cache ${statusPayload.kbar_cache_count || 0} / warrant cache ${statusPayload.warrant_top3_cache_count || 0}`, "blue"]);
      }
      $("statusList").innerHTML = rows.map(([title, body, tone]) => `
        <div class="status-row">
          <strong>${html(title)}</strong>
          <div class="meta"><span>${html(body)}</span><span class="badge ${tone}">${tone.toUpperCase()}</span></div>
        </div>
      `).join("");
    }

    async function selectStock(id, nextView = null) {
      selected = stocks.find(s => s.id === id) || selected;
      renderOriginalFeed();
      await loadExtras(selected);
      renderDetail();
      renderWarrants();
      renderStatus();
      if (nextView) activate(nextView);
    }

    async function loadApp() {
      try {
        const [health, scans, cards, status] = await Promise.allSettled([
          getJson(`${API_BASE}/health`),
          getJson(`${API_BASE}/scan-results`),
          getJson(`${API_BASE}/scan-cards`),
          getJson(`${API_BASE}/status`)
        ]);
        if (health.status !== "fulfilled") throw health.reason;
        if (scans.status !== "fulfilled") throw scans.reason;
        stocks = (scans.value.data || []).map(mapStock);
        if (!stocks.length) throw new Error("scan-results empty");
        if (cards.status === "fulfilled" && cards.value?.data?.flex_messages) {
          scanBubbles = [];
          cards.value.data.flex_messages.forEach(message => {
            const bubbles = message?.contents?.contents || [];
            bubbles.forEach(bubble => {
              const id = stockIdFromBubble(bubble);
              if (id) scanBubbles.push({ id, bubble });
            });
          });
        }
        selected = stocks[0];
        statusPayload = status.status === "fulfilled" ? status.value.data : null;
        $("syncTitle").textContent = "已連線";
        $("syncMeta").textContent = `${stocks.length} 檔 / ${scans.value.generated_at || ""}`;
        renderOriginalFeed();
        await selectStock(selected.id);
      } catch (error) {
        stocks = [];
        selected = null;
        $("syncTitle").textContent = "API 失敗";
        $("syncMeta").textContent = error.message;
        $("cardFeed").innerHTML = `<div class="message">無法讀取原 bot API：${html(error.message)}。不顯示假資料，避免與 LINE 結果混淆。</div>`;
        renderStatus(error);
      }
    }

    document.querySelector(".filters").addEventListener("click", event => {
      const btn = event.target.closest("button[data-filter]");
      if (!btn) return;
      filter = btn.dataset.filter;
      document.querySelectorAll("[data-filter]").forEach(b => b.classList.toggle("active", b === btn));
      renderOriginalFeed();
    });

    $("searchInput").addEventListener("input", renderOriginalFeed);

    document.addEventListener("click", async event => {
      const nav = event.target.closest("[data-view]");
      if (nav) {
        activate(nav.dataset.view);
        return;
      }

      const action = event.target.closest("[data-action]");
      if (action) {
        event.preventDefault();
        const id = action.dataset.id;
        if (id && selected?.id !== id) await selectStock(id);
        const type = action.dataset.action;
        if (type === "chart") { activate("chartView"); return; }
        if (type === "warrant") { activate("warrantView"); return; }
        if (type === "financial") { window.open(`https://statementdog.com/analysis/${id}`, "_blank", "noopener"); return; }
        if (type === "realtime") { activate("chartView"); return; }
        if (type === "backtest") { activate("statusView"); return; }
        if (type === "watch") { activate("statusView"); return; }
      }

      const card = event.target.closest(".line-card");
      if (card) await selectStock(card.dataset.id, "chartView");
    });

    loadApp();
  </script>
</body>
</html>
