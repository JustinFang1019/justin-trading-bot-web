<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Justin Trading Bot Web</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-view="scanView">
  <main class="app">
    <header class="topbar">
      <button class="menu-btn" id="menuButton" type="button" aria-label="功能選單">≡</button>
      <div>
        <h1 id="pageTitle">個股查詢</h1>
        <p class="sub" id="pageSub">未登入可使用說明小卡上的示範指令；其它個股請加入 LINE bot。</p>
      </div>
      <div class="status-pill">
        <strong id="syncTitle">連線中</strong>
        <span id="syncMeta">讀取原 bot</span>
        <span class="usage-count" id="usageCount">今日使用 - 人</span>
      </div>
    </header>

    <div class="toolbar">
      <div class="controls">
        <div class="auth-panel">
          <span id="authStatus">LINE 登入檢查中</span>
          <button class="login-primary" id="authButton" type="button">登入</button>
        </div>
        <button class="home-btn" id="homeButton" type="button" aria-label="回主題首頁">
          <svg class="home-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M12 3.6 3.3 11.2a1 1 0 0 0 .7 1.8h1.1v6.4c0 .6.4 1 1 1h4.1v-5.8h3.6v5.8h4.1c.6 0 1-.4 1-1V13H20a1 1 0 0 0 .7-1.8L12 3.6Z"/>
          </svg>
        </button>
        <button class="back-btn" id="backButton" type="button" disabled hidden>上一層</button>
      </div>
      <label class="search" id="topSearchWrap" aria-label="搜尋股票">
        <input id="searchInput" placeholder="輸入代號或指令，例：2330">
      </label>
      <div class="filters">
        <button class="active" data-filter="all" title="所有掃描結果">全部</button>
        <button data-filter="START" title="首次出現的策略訊號">首次</button>
        <button data-filter="CONT" title="連續中的策略訊號">進行中</button>
        <button data-filter="rs90" title="相對強弱 RS 排名 90 以上">RS 90+</button>
        <button data-filter="repeat" title="連續多日發出訊號">連續</button>
      </div>
    </div>

    <section class="view active" id="scanView">
      <div class="feed" id="cardFeed">
        <div class="message">正在讀取原 LINE bot 小卡...</div>
      </div>
      <div class="feed" id="actionNotice"></div>
    </section>

    <section class="view" id="chartView">
      <div class="detail-grid">
        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title" id="chartTitle">K 線</div>
              <div class="panel-sub" id="chartSub">使用原 bot /kbar 快取繪製，Yahoo 只保留為外部備援。</div>
            </div>
            <a class="badge blue" id="yahooLink" target="_blank" rel="noopener">Yahoo</a>
          </div>
          <div class="panel-body">
            <div class="chart-wrap"><canvas id="chart" width="720" height="360"></canvas></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">策略資訊</div>
              <div class="panel-sub">這裡只展示掃描結果，不重新計算策略。</div>
            </div>
          </div>
          <div class="panel-body" id="detailBody"></div>
        </div>
      </div>
    </section>

    <section class="view" id="warrantView">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title" id="warrantTitle">權證</div>
            <div class="panel-sub">讀取原 bot Top 3 權證快取，不從 Web 端重算。</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="warrant-list" id="warrantList"></div>
        </div>
      </div>
    </section>

    <section class="view" id="statusView">
      <div class="status-grid" id="statusList"></div>
    </section>

    <section class="view" id="activeEtfView">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title" id="activeEtfTitle">ETF 研究</div>
            <div class="panel-sub" id="activeEtfSub">全部 ETF 規模排名、持股變化與共同持有查詢。</div>
          </div>
          <span class="badge blue" id="activeEtfBadge">讀取中</span>
        </div>
        <div class="panel-body">
          <div class="etf-tools">
            <label class="search" id="activeEtfSearchWrap" aria-label="搜尋 ETF 或個股">
              <input id="activeEtfSearch" placeholder="搜尋 ETF 或個股代號，例如 00988A / 2330 / AVGO.US">
            </label>
            <div id="activeEtfFlowSummary"></div>
            <div class="etf-feature-groups" id="activeEtfFeatureGrid">
              <div class="etf-tool-section-label">決策工具</div>
              <div class="etf-decision-grid">
                <button class="etf-feature-card featured" data-etf-tool="compare" type="button">
                  <strong><span class="etf-tool-emoji">🔀</span>ETF 比較</strong>
                  <span>2-3 檔費率、殖利率、折溢價、重疊</span>
                </button>
                <button class="etf-feature-card featured" data-etf-tool="filter" type="button">
                  <strong><span class="etf-tool-emoji">🔍</span>進階篩選</strong>
                  <span>規模/殖利率/費率/配息頻率</span>
                </button>
                <button class="etf-feature-card featured" data-etf-tool="portfolio" type="button">
                  <strong><span class="etf-tool-emoji">🧮</span>投組模擬</strong>
                  <span>比例算殖利率、費率、重疊</span>
                </button>
                <button class="etf-feature-card featured" data-etf-tool="position" type="button">
                  <strong><span class="etf-tool-emoji">🎯</span>部位試算</strong>
                  <span>張數與最大風險</span>
                </button>
              </div>
              <div class="etf-tool-section-label">市場 ・ 籌碼</div>
              <div class="etf-monitor-grid">
                <button class="etf-feature-card" data-etf-tool="marketDashboard" type="button">
                  <strong><span class="etf-tool-emoji">🌡️</span>大盤儀表板</strong>
                  <span>情緒與 Top 5</span>
                </button>
                <button class="etf-feature-card" data-etf-tool="flow" type="button">
                  <strong><span class="etf-tool-emoji">💰</span>資金流</strong>
                  <span>月申贖排行</span>
                </button>
                <button class="etf-feature-card" data-etf-tool="institutional" type="button">
                  <strong><span class="etf-tool-emoji">🏦</span>法人籌碼</strong>
                  <span>個股佐證</span>
                </button>
                <button class="etf-feature-card" data-etf-tool="heatmap" type="button">
                  <strong><span class="etf-tool-emoji">🧬</span>持股重疊</strong>
                  <span>熱力圖</span>
                </button>
                <button class="etf-feature-card" data-etf-tool="hitRate" type="button" hidden>
                  <strong><span class="etf-tool-emoji">🎯</span>策略勝率</strong>
                  <span>30 日觀察</span>
                </button>
              </div>
              <div class="etf-tool-section-label">配息 ・ 趨勢</div>
              <div class="etf-monitor-grid">
                <button class="etf-feature-card" data-etf-tool="calendar" type="button">
                  <strong><span class="etf-tool-emoji">🗓️</span>配息日曆</strong>
                  <span>30 天除息</span>
                </button>
                <button class="etf-feature-card" data-etf-tool="dividendCalc" type="button">
                  <strong><span class="etf-tool-emoji">💵</span>配息試算</strong>
                  <span>張數入帳估算</span>
                </button>
                <button class="etf-feature-card" data-etf-tool="monthlyDividendPlan" type="button">
                  <strong><span class="etf-tool-emoji">📆</span>月月配試算</strong>
                  <span>目標月領→買哪幾檔</span>
                </button>
                <button class="etf-feature-card" data-etf-tool="stockFlow" type="button">
                  <strong><span class="etf-tool-emoji">📈</span>個股動向</strong>
                  <span>誰加碼 2330</span>
                </button>
                <button class="etf-feature-card" data-etf-tool="holdingTrend" type="button">
                  <strong><span class="etf-tool-emoji">📊</span>14 日趨勢</strong>
                  <span>權重變化</span>
                </button>
              </div>
              <details class="etf-tool-more">
                <summary>進階工具</summary>
                <div class="etf-monitor-grid">
                  <button class="etf-feature-card" data-etf-tool="rebalanceRadar" type="button">
                    <strong><span class="etf-tool-emoji">📡</span>季調雷達</strong>
                    <span>預測納入/剔除</span>
                  </button>
                  <button class="etf-feature-card" data-etf-tool="themeRadar" type="button">
                    <strong><span class="etf-tool-emoji">🧭</span>主題輪動</strong>
                    <span>資金與題材</span>
                  </button>
                  <button class="etf-feature-card" data-etf-tool="naturalQuery" type="button">
                    <strong><span class="etf-tool-emoji">💬</span>自然語言</strong>
                    <span>中文轉篩選</span>
                  </button>
                  <button class="etf-feature-card" data-etf-tool="shareCard" type="button" hidden>
                    <strong><span class="etf-tool-emoji">🖼️</span>卡片分享</strong>
                    <span>預覽與 LINE 分享</span>
                  </button>
                </div>
              </details>
              <div class="etf-reserved-grid" aria-label="即將推出">
                <button class="etf-feature-card reserved" type="button" disabled>
                  <strong>自選 + 推播</strong>
                  <span>即將推出</span>
                </button>
                <button class="etf-feature-card reserved" type="button" disabled>
                  <strong>自選分組</strong>
                  <span>即將推出</span>
                </button>
                <button class="etf-feature-card" id="sourceAdminTool" data-etf-tool="sourceAdmin" type="button" hidden>
                  <strong>來源狀態</strong>
                  <span>管理員</span>
                </button>
              </div>
            </div>
            <section class="upcoming-etf-section" id="upcomingEtfSection">
              <button class="upcoming-entry compact" data-upcoming-list type="button">
                <span><strong>即將上市 ETF</strong> <span id="upcomingEtfLead">查看預購、募集、掛牌與資料來源</span></span>
                <b id="upcomingEtfBadge">3 檔</b>
              </button>
            </section>
            <div class="etf-rank-controls" id="etfRankControls">
              <div class="filters etf-type-tabs" id="etfTypeTabs">
                <button class="active" data-etf-filter="all">全部</button>
                <button data-etf-filter="active">主動</button>
                <button data-etf-filter="stock">股票</button>
                <button data-etf-filter="highDividend">高股息</button>
                <button data-etf-filter="bond">債券</button>
              </div>
            </div>
            <div class="etf-sort-row" id="etfSortRow" aria-label="ETF 排序">
              <button class="active" data-etf-sort="asset_size_billion" type="button">規模金額 <span>↓</span></button>
              <button data-etf-sort="yield_12m" type="button">近12月殖利率 <span></span></button>
              <button data-etf-sort="expense_ratio" type="button">費率 <span></span></button>
              <button data-etf-sort="nav_premium" type="button">折溢價 <span></span></button>
            </div>
          </div>
          <div class="status-grid" id="activeEtfList" style="margin-top:10px;"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="drawer-overlay" id="drawerOverlay" aria-hidden="true">
    <aside class="drawer" aria-label="功能選單">
      <div class="drawer-head">
        <strong>功能選單</strong>
        <button class="drawer-close" id="drawerClose" type="button" aria-label="關閉">×</button>
      </div>
      <button class="menu-item active" data-menu-view="scanView"><strong>01</strong><strong>個股查詢</strong><span>原 LINE bot 小卡網頁版</span></button>
      <button class="menu-item" data-menu-view="activeEtfView"><strong>02</strong><strong>ETF 研究</strong><span>規模排名、持股變化、共同異動</span></button>
      <button class="menu-item" data-menu-command="教學"><strong>03</strong><strong>教學</strong><span>策略與權證教學</span></button>
      <button class="menu-item" data-menu-view="statusView"><strong>04</strong><strong>管理狀態</strong><span>管理員限定</span></button>
      <button class="menu-item" id="themeToggle" type="button"><strong>夜</strong><strong>深色模式</strong><span>適合收盤後長時間看 ETF 與小卡</span></button>
    </aside>
  </div>

  <nav class="bottom-nav" aria-label="主選單">
    <button class="active" data-view="scanView"><strong>01</strong>個股</button>
    <button data-view="activeEtfView"><strong>02</strong>ETF</button>
    <button data-view="chartView"><strong>03</strong>K線</button>
    <button data-view="statusView"><strong>04</strong>狀態</button>
  </nav>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
