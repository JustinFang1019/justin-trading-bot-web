<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Justin Trading Bot Web</title>
  <style>
    :root {
      --bg: #eef2f7;
      --surface: #ffffff;
      --ink: #182230;
      --muted: #667085;
      --line: #d9e1ec;
      --navy: #17172d;
      --blue: #1d4ed8;
      --blue-soft: #dbeafe;
      --green: #047857;
      --green-soft: #dcfce7;
      --red: #b42318;
      --red-soft: #fee2e2;
      --amber: #a16207;
      --amber-soft: #fef3c7;
      --purple: #6d28d9;
      --purple-soft: #ede9fe;
      --shadow: 0 12px 30px rgba(16, 24, 40, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input { font: inherit; }

    .app {
      max-width: 960px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 12px 10px 84px;
    }

    .topbar {
      align-items: center;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      margin-bottom: 10px;
    }

    .menu-btn {
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--blue);
      cursor: pointer;
      display: flex;
      font-size: 22px;
      font-weight: 900;
      height: 42px;
      justify-content: center;
      line-height: 1;
      width: 42px;
    }

    h1 {
      font-size: 20px;
      line-height: 1.25;
      margin: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin: 3px 0 0;
    }

    .status-pill {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 3px;
      min-width: 136px;
      padding: 8px 9px;
      text-align: right;
    }

    .status-pill strong {
      display: block;
      font-size: 12px;
    }

    .status-pill span {
      color: var(--muted);
      display: block;
      font-size: 10px;
    }

    .status-pill .usage-count {
      color: var(--blue);
      font-size: 11px;
      font-weight: 900;
    }

    .toolbar {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    .controls {
      display: grid;
      gap: 8px;
      grid-template-columns: minmax(0, 1fr) auto auto;
    }

    .search {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: flex;
      overflow: hidden;
    }

    .search input {
      background: transparent;
      border: 0;
      color: var(--ink);
      outline: 0;
      padding: 11px 12px;
      width: 100%;
    }

    .back-btn,
    .home-btn {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--blue);
      cursor: pointer;
      font-weight: 900;
      padding: 10px 12px;
    }

    .home-btn {
      align-items: center;
      display: flex;
      justify-content: center;
      min-width: 44px;
    }

    .home-icon {
      display: block;
      height: 21px;
      width: 21px;
    }

    .back-btn:disabled {
      color: var(--muted);
      cursor: default;
      opacity: .45;
    }

    .auth-panel {
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      justify-content: space-between;
      min-width: 0;
      padding: 8px 10px;
    }

    .auth-panel span {
      font-size: 12px;
      line-height: 1.35;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .auth-panel button {
      background: var(--blue);
      border: 1px solid var(--blue);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 900;
      padding: 7px 9px;
      white-space: nowrap;
    }

    .filters {
      display: none;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .etf-type-tabs,
    .etf-detail-tabs {
      display: flex;
      margin-top: 8px;
    }

    .etf-type-tabs button,
    .etf-detail-tabs button {
      flex: 1 0 auto;
      font-weight: 900;
      min-width: 74px;
      text-align: center;
    }

    .filters button,
    .icon-btn,
    .card-button {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #475467;
      cursor: pointer;
      white-space: nowrap;
    }

    .filters button {
      padding: 8px 11px;
    }

    .filters button.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .etf-detail-tabs button.added {
      background: var(--blue-soft);
      border-color: #bfdbfe;
      color: var(--blue);
    }

    .etf-detail-tabs button.increased {
      background: var(--green-soft);
      border-color: #bbf7d0;
      color: var(--green);
    }

    .etf-detail-tabs button.decreased {
      background: var(--red-soft);
      border-color: #fecaca;
      color: var(--red);
    }

    .etf-detail-tabs button.holdings {
      background: var(--purple-soft);
      border-color: #ddd6fe;
      color: var(--purple);
    }

    .etf-detail-tabs button.added.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .etf-detail-tabs button.increased.active {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .etf-detail-tabs button.decreased.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .etf-detail-tabs button.holdings.active {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    .drawer-overlay {
      background: rgba(15, 23, 42, .38);
      bottom: 0;
      display: none;
      left: 0;
      position: fixed;
      right: 0;
      top: 0;
      z-index: 40;
    }

    .drawer-overlay.open { display: block; }

    .drawer {
      background: var(--surface);
      border-right: 1px solid var(--line);
      box-shadow: 18px 0 34px rgba(16, 24, 40, .22);
      height: 100%;
      max-width: 82vw;
      padding: 16px 12px;
      width: 284px;
    }

    .drawer-head {
      align-items: center;
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .drawer-head strong {
      font-size: 18px;
    }

    .drawer-close {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      height: 34px;
      width: 34px;
    }

    .menu-item {
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      display: grid;
      gap: 2px 10px;
      grid-template-columns: 34px minmax(0, 1fr);
      margin-bottom: 8px;
      padding: 10px;
      text-align: left;
      width: 100%;
    }

    .menu-item.active {
      background: #eff6ff;
      border-color: #93c5fd;
    }

    .menu-item strong {
      font-size: 14px;
      line-height: 1.25;
    }

    .menu-item span {
      color: var(--muted);
      font-size: 11px;
      grid-column: 2;
      line-height: 1.35;
    }

    .view { display: none; }
    .view.active { display: block; }

    .feed {
      display: grid;
      gap: 10px;
      margin: 0 auto;
      max-width: 640px;
    }

    .line-card,
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(16, 24, 40, .04);
      overflow: hidden;
    }

    .line-card.selected {
      border-color: var(--blue);
      box-shadow: 0 0 0 2px rgba(29, 78, 216, .12);
    }

    .card-head {
      background: var(--navy);
      color: #fff;
      padding: 11px 12px;
    }

    .card-title {
      align-items: baseline;
      display: flex;
      gap: 7px;
      justify-content: space-between;
    }

    .card-title strong {
      font-size: 18px;
      line-height: 1.2;
    }

    .score {
      color: #facc15;
      font-size: 12px;
      font-weight: 800;
    }

    .signal-line {
      color: #c7d2fe;
      display: flex;
      font-size: 12px;
      gap: 8px;
      justify-content: space-between;
      line-height: 1.35;
      margin-top: 4px;
    }

    .card-body {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .quote-row,
    .info-row {
      background: #f8fafc;
      border-radius: 7px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      padding: 7px;
    }

    .info-row {
      grid-template-columns: 84px minmax(0, 1fr);
    }

    .cell small,
    .info-row small {
      color: var(--muted);
      display: block;
      font-size: 11px;
    }

    .cell strong,
    .info-row strong {
      color: var(--ink);
      display: block;
      font-size: 14px;
      line-height: 1.25;
      margin-top: 2px;
      overflow-wrap: anywhere;
    }

    .pills {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }

    .pill {
      border-radius: 7px;
      min-height: 48px;
      padding: 7px;
    }

    .pill small {
      display: block;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .pill strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .pill.entry { background: var(--blue-soft); color: #1e3a8a; }
    .pill.rr { background: var(--green-soft); color: #14532d; }
    .pill.rs { background: #e0f2fe; color: #075985; }

    .card-actions {
      display: grid;
      gap: 7px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .card-button {
      color: var(--blue);
      font-size: 13px;
      font-weight: 800;
      min-height: 38px;
      padding: 8px 4px;
      text-align: center;
    }

    .card-button.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .flex-card {
      box-shadow: var(--shadow);
      margin: 0;
    }

    .flex-box {
      display: flex;
      gap: 6px;
    }

    .flex-box.vertical { flex-direction: column; }
    .flex-box.horizontal { align-items: stretch; flex-direction: row; }

    .flex-box[data-action] { cursor: pointer; }

    .flex-text {
      color: #344054;
      font-size: 12px;
      line-height: 1.35;
      min-width: 0;
      overflow-wrap: normal;
      word-break: keep-all;
    }

    .flex-text.wrap {
      overflow-wrap: break-word;
      white-space: normal;
    }

    .flex-text.lg,
    .flex-text.xl { font-size: 16px; }
    .flex-text.md { font-size: 14px; }
    .flex-text.xs,
    .flex-text.xxs { font-size: 11px; }
    .flex-text.bold { font-weight: 800; }

    .panel-head {
      align-items: center;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 900;
    }

    .panel-sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      margin-top: 3px;
    }

    .panel-body {
      padding: 12px;
    }

    .badge {
      border-radius: 999px;
      display: inline-flex;
      font-size: 12px;
      font-weight: 800;
      padding: 5px 8px;
      white-space: nowrap;
    }

    .badge.green { background: var(--green-soft); color: var(--green); }
    .badge.blue { background: var(--blue-soft); color: var(--blue); }
    .badge.amber { background: var(--amber-soft); color: var(--amber); }
    .badge.red { background: var(--red-soft); color: var(--red); }

    .chart-wrap {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      height: 320px;
      overflow: hidden;
    }

    canvas {
      display: block;
      height: 100%;
      width: 100%;
    }

    .detail-grid,
    .status-grid,
    .warrant-list {
      display: grid;
      gap: 10px;
    }

    .warrant-row,
    .status-row {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .etf-tools {
      display: grid;
      gap: 8px;
      margin: 0 0 10px;
    }

    .upcoming-etf-section {
      background: #dbeafe;
      border: 1px solid #93c5fd;
      border-radius: 8px;
      padding: 10px;
    }

    .etf-flow-summary {
      background: var(--navy);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      color: #fff;
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .etf-flow-summary .panel-title {
      color: #fff;
    }

    .etf-flow-summary .panel-sub {
      color: #c7d2fe;
    }

    .etf-period-tabs {
      background: rgba(255,255,255,.1);
      border-radius: 8px;
      display: grid;
      gap: 4px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      padding: 4px;
    }

    .etf-period-tabs button {
      background: transparent;
      border: 0;
      border-radius: 6px;
      color: #c7d2fe;
      font-size: 12px;
      font-weight: 900;
      padding: 8px 4px;
    }

    .etf-period-tabs button.active {
      background: #fff;
      color: var(--blue);
    }

    .etf-flow-grid,
    .etf-feature-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .etf-flow-stat {
      background: rgba(255,255,255,.1);
      border-radius: 8px;
      padding: 10px;
    }

    .etf-flow-stat small {
      color: #c7d2fe;
      display: block;
      font-size: 11px;
      margin-bottom: 3px;
    }

    .etf-flow-stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.15;
    }

    .etf-flow-mini {
      align-items: center;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      display: grid;
      gap: 8px;
      grid-template-columns: minmax(0, 1fr) auto;
      padding: 9px;
    }

    .etf-flow-mini strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
    }

    .etf-flow-mini span {
      color: #c7d2fe;
      display: block;
      font-size: 11px;
      margin-top: 2px;
    }

    .etf-flow-mini b {
      color: #86efac;
      font-size: 13px;
      white-space: nowrap;
    }

    .etf-flow-mini b.neg {
      color: #fca5a5;
    }

    .etf-feature-card {
      appearance: none;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      display: grid;
      gap: 4px;
      min-height: 82px;
      padding: 10px;
      text-align: left;
      width: 100%;
    }

    .etf-feature-card.featured {
      background: #f8fbff;
      border-color: #bfdbfe;
    }

    .etf-feature-card strong {
      font-size: 14px;
      line-height: 1.25;
    }

    .etf-feature-card span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .etf-feature-chip {
      background: var(--blue-soft);
      border-radius: 999px;
      color: var(--blue);
      display: inline-flex;
      font-size: 11px;
      font-weight: 900;
      padding: 3px 7px;
      width: fit-content;
    }

    .upcoming-entry {
      align-items: center;
      appearance: none;
      background: #ffffff;
      border: 1px solid #93c5fd;
      border-radius: 8px;
      color: var(--ink);
      cursor: pointer;
      display: grid;
      gap: 8px;
      grid-template-columns: minmax(0, 1fr) auto;
      min-height: 54px;
      padding: 10px 12px;
      text-align: left;
      width: 100%;
    }

    .upcoming-entry:hover {
      border-color: var(--blue);
      box-shadow: 0 10px 22px rgba(29, 78, 216, .16);
    }

    .upcoming-entry strong {
      display: block;
      font-size: 15px;
      line-height: 1.25;
    }

    .upcoming-entry span {
      color: #475467;
      display: block;
      font-size: 12px;
      line-height: 1.35;
      margin-top: 2px;
    }

    .upcoming-entry b {
      background: var(--blue);
      border-radius: 999px;
      color: #fff;
      font-size: 12px;
      padding: 6px 9px;
      white-space: nowrap;
    }

    .upcoming-etf-head {
      align-items: center;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .upcoming-etf-head strong {
      font-size: 15px;
    }

    .upcoming-etf-head span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      text-align: right;
    }

    .upcoming-etf-list {
      display: grid;
      gap: 7px;
    }

    .upcoming-etf-row {
      align-items: center;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      display: grid;
      gap: 8px;
      grid-template-columns: 64px minmax(0, 1fr) auto;
      min-height: 72px;
      padding: 8px;
      text-align: left;
      width: 100%;
    }

    .upcoming-etf-row:hover {
      border-color: var(--blue);
      box-shadow: 0 8px 18px rgba(29, 78, 216, .08);
    }

    .upcoming-date {
      align-items: center;
      background: #eef4ff;
      border-radius: 8px;
      color: var(--blue);
      display: flex;
      flex-direction: column;
      font-size: 12px;
      font-weight: 900;
      justify-content: center;
      min-height: 54px;
      padding: 5px;
      text-align: center;
    }

    .upcoming-date small {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .upcoming-main {
      min-width: 0;
    }

    .upcoming-main strong {
      display: block;
      font-size: 17px;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .upcoming-main .upcoming-code {
      color: var(--blue);
      font-weight: 900;
    }

    .upcoming-main .upcoming-name {
      color: var(--ink);
      font-weight: 900;
    }

    .upcoming-main span {
      color: var(--muted);
      display: block;
      font-size: 12px;
      line-height: 1.35;
      margin-top: 2px;
    }

    .upcoming-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 5px;
    }

    .upcoming-tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      padding: 2px 7px;
    }

    .upcoming-tag.green { background: var(--green-soft); color: var(--green); }
    .upcoming-tag.blue { background: var(--blue-soft); color: var(--blue); }
    .upcoming-tag.amber { background: var(--amber-soft); color: var(--amber); }
    .upcoming-tag.purple { background: var(--purple-soft); color: var(--purple); }

    .upcoming-state {
      background: #f7f9fc;
      border-radius: 8px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
      padding: 8px;
      text-align: center;
      white-space: nowrap;
    }

    .upcoming-detail-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .upcoming-detail-hero {
      background: var(--navy);
      border-radius: 8px;
      color: #fff;
      padding: 12px;
    }

    .upcoming-detail-hero h2 {
      font-size: 19px;
      line-height: 1.22;
      margin: 0;
      word-break: keep-all;
    }

    .upcoming-detail-hero .upcoming-hero-code {
      color: #fff;
      display: block;
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 3px;
    }

    .upcoming-detail-hero .upcoming-hero-name {
      color: #fff;
      display: block;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .upcoming-detail-hero p {
      color: #c9d2ff;
      font-size: 12px;
      line-height: 1.45;
      margin: 5px 0 0;
    }

    .upcoming-note {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      padding: 9px;
    }

    .etf-row {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      padding: 10px;
    }

    .etf-line {
      align-items: baseline;
      display: flex;
      gap: 8px;
      justify-content: space-between;
    }

    .etf-line strong {
      font-size: 16px;
    }

    .rank {
      color: var(--blue);
      font-size: 13px;
      font-weight: 900;
    }

    .mini-pills {
      display: grid;
      gap: 7px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 8px;
    }

    .metric-pills {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-top: 8px;
    }

    .mini-pill {
      border-radius: 8px;
      padding: 8px;
    }

    .mini-pill small {
      color: var(--muted);
      display: block;
      font-size: 10px;
      margin-bottom: 2px;
    }

    .mini-pill strong {
      display: block;
      font-size: 13px;
      line-height: 1.2;
    }

    .tone-green { background: var(--green-soft); color: var(--green); }
    .tone-blue { background: var(--blue-soft); color: var(--blue); }
    .tone-red { background: var(--red-soft); color: var(--red); }
    .tone-amber { background: var(--amber-soft); color: var(--amber); }
    .tone-purple { background: var(--purple-soft); color: var(--purple); }

    .etf-spark {
      align-items: flex-end;
      display: flex;
      gap: 2px;
      height: 20px;
      margin-top: 8px;
    }

    .etf-spark i {
      background: #dbeafe;
      border-radius: 2px;
      flex: 1;
      min-height: 4px;
    }

    .etf-spark i.up {
      background: #fecaca;
    }

    .etf-spark-note {
      color: var(--muted);
      font-size: 11px;
      margin-top: 3px;
    }

    .etf-hero {
      background: linear-gradient(180deg, #fff 0%, #f8fbff 100%);
      border: 1px solid var(--line);
      border-top: 4px solid var(--blue);
      border-radius: 8px;
      padding: 12px;
    }

    .etf-hero h2 {
      font-size: 20px;
      line-height: 1.25;
      margin: 0;
    }

    .etf-hero p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin: 4px 0 0;
    }

    .etf-price-line {
      align-items: flex-end;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      margin-top: 10px;
    }

    .etf-price-line strong {
      font-size: 22px;
      line-height: 1.1;
    }

    .etf-price-line small {
      color: var(--muted);
      display: block;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 3px;
    }

    .etf-price-line span {
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      text-align: right;
    }

    .compare-table,
    .heatmap-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow-x: auto;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: 90px repeat(3, 112px);
      min-width: 426px;
    }

    .compare-grid div,
    .heatmap-grid div {
      border-bottom: 1px solid #eef2f7;
      border-right: 1px solid #eef2f7;
      font-size: 12px;
      padding: 8px;
    }

    .compare-grid .head,
    .heatmap-grid .axis {
      background: #eff6ff;
      color: var(--blue);
      font-weight: 900;
    }

    .compare-grid .label {
      background: #f8fafc;
      color: var(--muted);
      font-weight: 900;
    }

    .compare-grid .win {
      background: var(--green-soft);
      color: var(--green);
      font-weight: 900;
    }

    .heatmap-grid {
      display: grid;
      grid-template-columns: 96px repeat(6, 58px);
      min-width: 444px;
    }

    .heatmap-grid div {
      align-items: center;
      display: flex;
      justify-content: center;
      min-height: 40px;
      text-align: center;
    }

    .upcoming-etf-row.urgent .upcoming-date {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .heatmap-grid .axis {
      justify-content: flex-start;
    }

    .heatmap-grid .low { background: #ecfdf3; color: var(--green); font-weight: 900; }
    .heatmap-grid .mid { background: #fef3c7; color: var(--amber); font-weight: 900; }
    .heatmap-grid .high { background: #fee2e2; color: var(--red); font-weight: 900; }

    .calendar-wrap {
      display: grid;
      gap: 10px;
    }

    .calendar-grid {
      display: grid;
      gap: 5px;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .calendar-grid div {
      align-items: flex-start;
      background: #f8fafc;
      border: 1px solid #eef2f7;
      border-radius: 6px;
      color: var(--muted);
      display: flex;
      font-size: 11px;
      justify-content: flex-start;
      min-height: 58px;
      min-width: 0;
    }

    .calendar-grid .head {
      align-items: center;
      background: transparent;
      border: 0;
      font-weight: 900;
      justify-content: center;
      min-height: 22px;
    }

    .calendar-grid .calendar-day {
      display: grid;
      gap: 4px;
      padding: 6px;
    }

    .calendar-day.muted {
      opacity: .48;
    }

    .calendar-day.today {
      border-color: var(--blue);
      box-shadow: 0 0 0 1px rgba(37, 99, 235, .16);
    }

    .calendar-date {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .calendar-event {
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 5px;
      color: var(--blue);
      cursor: pointer;
      display: block;
      font-family: inherit;
      font-size: 10px;
      font-weight: 900;
      line-height: 1.2;
      overflow: hidden;
      padding: 3px 4px;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: 100%;
    }

    .calendar-more {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }

    .filter-panel {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 9px;
      padding: 10px;
    }

    .tool-controls {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 10px;
      padding: 10px;
    }

    .tool-input-row {
      display: grid;
      gap: 8px;
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .tool-input-row input {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      min-width: 0;
      padding: 10px 12px;
    }

    .tool-input-row button,
    .tool-chip {
      align-items: center;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--blue);
      cursor: pointer;
      display: inline-flex;
      font-size: 12px;
      font-weight: 900;
      justify-content: center;
      min-height: 36px;
      padding: 0 12px;
    }

    .tool-chip.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .tool-chip.warn {
      background: var(--amber-soft);
      border-color: #fde68a;
      color: var(--amber);
    }

    .tool-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-panel input[type="range"] {
      accent-color: var(--blue);
      width: 100%;
    }

    .filter-panel .range-line {
      grid-template-columns: 78px minmax(0, 1fr) 78px;
    }

    .filter-panel label {
      align-items: center;
      color: var(--muted);
      display: flex;
      font-size: 12px;
      font-weight: 900;
      gap: 8px;
    }

    .filter-panel input[type="checkbox"] {
      accent-color: var(--blue);
      height: 16px;
      width: 16px;
    }

    .range-line {
      align-items: center;
      display: grid;
      gap: 8px;
      grid-template-columns: 86px minmax(0, 1fr) auto;
    }

    .range-line span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
    }

    .range-track {
      background: #e5e7eb;
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
    }

    .range-track i {
      background: var(--blue);
      display: block;
      height: 100%;
    }

    .range-line strong {
      color: var(--blue);
      font-size: 12px;
      white-space: nowrap;
    }

    .change-row {
      align-items: center;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      gap: 10px;
      grid-template-columns: minmax(0, 1fr) 94px;
      overflow: hidden;
      padding: 10px 10px 10px 14px;
      position: relative;
    }

    .change-row::before {
      border-radius: 8px 0 0 8px;
      bottom: 0;
      content: "";
      left: 0;
      position: absolute;
      top: 0;
      width: 5px;
    }

    .change-row.added::before { background: var(--blue); }
    .change-row.increased::before { background: var(--green); }
    .change-row.decreased::before { background: var(--red); }
    .change-row.holdings::before { background: var(--purple); }

    .change-main {
      min-width: 0;
    }

    .change-title {
      align-items: baseline;
      display: flex;
      gap: 8px;
      min-width: 0;
    }

    .change-title .code {
      flex: 0 0 auto;
    }

    .change-title .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .change-row .code {
      font-size: 20px;
      font-weight: 900;
    }

    .change-row .name {
      color: var(--ink);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.35;
    }

    .change-row .delta {
      align-items: center;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      font-size: 16px;
      font-weight: 900;
      justify-content: center;
      min-height: 78px;
      text-align: center;
    }

    .change-row .delta small {
      font-size: 11px;
      font-weight: 800;
      margin-top: 2px;
    }

    .change-tags {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
    }

    .change-tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #475467;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 7px;
    }

    .mini-bar {
      background: #edf2f7;
      border-radius: 999px;
      height: 7px;
      margin-top: 8px;
      overflow: hidden;
    }

    .mini-bar i {
      background: var(--blue);
      display: block;
      height: 100%;
    }

    .flow-bars {
      display: grid;
      gap: 4px;
      margin-top: 8px;
    }

    .flow-bar {
      align-items: center;
      display: grid;
      font-size: 10px;
      font-weight: 900;
      gap: 6px;
      grid-template-columns: 18px 1fr auto;
    }

    .flow-bar span:nth-child(2) {
      background: #e5e7eb;
      border-radius: 999px;
      height: 7px;
      overflow: hidden;
    }

    .flow-bar i {
      background: var(--green);
      display: block;
      height: 100%;
    }

    .flow-bar.out i {
      background: var(--red);
    }

    .flow-bar em {
      color: #667085;
      font-style: normal;
    }

    .section-title {
      align-items: center;
      display: flex;
      font-size: 14px;
      font-weight: 900;
      justify-content: space-between;
      margin: 3px 0 0;
    }

    .section-title span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 400;
    }

    .warrant-row strong,
    .status-row strong {
      display: block;
      font-size: 14px;
    }

    .meta {
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      line-height: 1.45;
      margin-top: 5px;
    }

    .message {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      padding: 10px;
      text-align: center;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 10px;
    }

    .suggestions button,
    .copy-command {
      background: #fff;
      border: 1px solid #d7e3f4;
      border-radius: 8px;
      color: var(--blue);
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
      padding: 7px 10px;
    }

    .copy-command {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .command-text {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      font-size: 18px;
      font-weight: 900;
      margin-top: 8px;
      padding: 10px;
    }

    .text-summary {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #344054;
      font-family: Consolas, "Microsoft JhengHei", monospace;
      font-size: 12px;
      line-height: 1.55;
      margin-top: 10px;
      padding: 10px;
      white-space: pre-wrap;
    }

    .help-list {
      display: grid;
      gap: 8px;
    }

    .help-section {
      background: #f8f8ff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .help-section-title {
      font-size: 14px;
      font-weight: 900;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .help-row {
      appearance: none;
      background: #fff;
      border: 1px solid #d7e3f4;
      border-radius: 8px;
      cursor: pointer;
      display: grid;
      grid-template-columns: minmax(88px, .8fr) minmax(0, 1.2fr) auto;
      gap: 8px;
      padding: 9px 10px;
      text-align: left;
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
      width: 100%;
    }

    .help-row:hover {
      border-color: var(--blue);
      box-shadow: 0 8px 20px rgba(37, 99, 235, .12);
      transform: translateY(-1px);
    }

    .help-row::after {
      align-self: center;
      background: #eaf1ff;
      border-radius: 999px;
      color: var(--blue);
      content: "點擊";
      font-size: 11px;
      font-weight: 900;
      padding: 4px 8px;
    }

    .help-note {
      background: transparent;
      border: 0;
      color: var(--muted);
      display: grid;
      grid-template-columns: minmax(88px, .8fr) minmax(0, 1.2fr);
      gap: 8px;
      padding: 4px 0;
    }

    .help-row strong,
    .help-note strong {
      display: block;
      color: #333;
      font-size: 12px;
      line-height: 1.35;
    }

    .help-row span,
    .help-note span {
      color: var(--muted);
      display: block;
      font-size: 12px;
      line-height: 1.45;
    }

    .bottom-nav {
      background: rgba(255,255,255,.97);
      border-top: 1px solid var(--line);
      bottom: 0;
      box-shadow: 0 -8px 22px rgba(16, 24, 40, .08);
      display: none;
      grid-template-columns: repeat(4, 1fr);
      left: 0;
      position: fixed;
      right: 0;
      z-index: 20;
    }

    .bottom-nav button {
      background: transparent;
      border: 0;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      padding: 9px 4px 10px;
    }

    .bottom-nav button strong {
      display: block;
      font-size: 16px;
      line-height: 1;
      margin-bottom: 3px;
    }

    .bottom-nav button.active {
      color: var(--blue);
      font-weight: 900;
    }

    @media (min-width: 760px) {
      .toolbar {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
      }

      .feed { grid-template-columns: minmax(0, 1fr); }

      .detail-grid {
        grid-template-columns: minmax(0, 1.35fr) minmax(280px, .65fr);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="menu-btn" id="menuButton" type="button" aria-label="功能選單">≡</button>
      <div>
        <h1 id="pageTitle">個股查詢</h1>
        <p class="sub" id="pageSub">未登入可使用說明小卡上的示範指令；其它個股請加入 LINE bot。</p>
      </div>
      <div class="status-pill">
        <strong id="syncTitle">連線中</strong>
        <span id="syncMeta">讀取原 bot</span>
        <span class="usage-count" id="usageCount">今日使用 - 人</span>
      </div>
    </header>

    <div class="toolbar">
      <label class="search" id="topSearchWrap" aria-label="搜尋股票">
        <input id="searchInput" placeholder="輸入說明小卡指令，例如 2330 / 即時 2330">
      </label>
      <div class="controls">
        <div class="auth-panel">
          <span id="authStatus">LINE 登入檢查中</span>
          <button id="authButton" type="button">登入</button>
        </div>
        <button class="home-btn" id="homeButton" type="button" aria-label="回主題首頁">
          <svg class="home-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M12 3.6 3.3 11.2a1 1 0 0 0 .7 1.8h1.1v6.4c0 .6.4 1 1 1h4.1v-5.8h3.6v5.8h4.1c.6 0 1-.4 1-1V13H20a1 1 0 0 0 .7-1.8L12 3.6Z"/>
          </svg>
        </button>
        <button class="back-btn" id="backButton" type="button" disabled>上一層</button>
      </div>
      <div class="filters">
        <button class="active" data-filter="all">全部</button>
        <button data-filter="START">START</button>
        <button data-filter="CONT">CONT</button>
        <button data-filter="rs90">RS 90+</button>
        <button data-filter="repeat">連續</button>
      </div>
    </div>

    <section class="view active" id="scanView">
      <div class="feed" id="cardFeed">
        <div class="message">正在讀取原 LINE bot 小卡...</div>
      </div>
      <div class="feed" id="actionNotice"></div>
    </section>

    <section class="view" id="chartView">
      <div class="detail-grid">
        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title" id="chartTitle">K 線</div>
              <div class="panel-sub" id="chartSub">使用原 bot /kbar 快取繪製，Yahoo 只保留為外部備援。</div>
            </div>
            <a class="badge blue" id="yahooLink" target="_blank" rel="noopener">Yahoo</a>
          </div>
          <div class="panel-body">
            <div class="chart-wrap"><canvas id="chart" width="720" height="360"></canvas></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">策略資訊</div>
              <div class="panel-sub">這裡只展示掃描結果，不重新計算策略。</div>
            </div>
          </div>
          <div class="panel-body" id="detailBody"></div>
        </div>
      </div>
    </section>

    <section class="view" id="warrantView">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title" id="warrantTitle">權證</div>
            <div class="panel-sub">讀取原 bot Top 3 權證快取，不從 Web 端重算。</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="warrant-list" id="warrantList"></div>
        </div>
      </div>
    </section>

    <section class="view" id="statusView">
      <div class="status-grid" id="statusList"></div>
    </section>

    <section class="view" id="activeEtfView">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title" id="activeEtfTitle">ETF 研究</div>
            <div class="panel-sub" id="activeEtfSub">全部 ETF 規模排名、持股變化與共同持有查詢。</div>
          </div>
          <span class="badge blue" id="activeEtfBadge">讀取中</span>
        </div>
        <div class="panel-body">
          <div class="etf-tools">
            <label class="search" id="activeEtfSearchWrap" aria-label="搜尋 ETF 或個股">
              <input id="activeEtfSearch" placeholder="搜尋 ETF 或個股代號，例如 00988A / 2330 / AVGO.US">
            </label>
            <div id="activeEtfFlowSummary"></div>
            <div class="etf-feature-grid" id="activeEtfFeatureGrid">
              <button class="etf-feature-card featured" data-etf-tool="compare" type="button">
                <span class="etf-feature-chip">核心</span>
                <strong>ETF 比較</strong>
                <span>2-3 檔比較費用率、殖利率、折溢價與持股重疊</span>
              </button>
              <button class="etf-feature-card featured" data-etf-tool="filter" type="button">
                <span class="etf-feature-chip">常用</span>
                <strong>進階篩選</strong>
                <span>規模、殖利率、費用率、配息頻率、資金流向</span>
              </button>
              <button class="etf-feature-card" data-etf-tool="flow" type="button">
                <strong>資金流向</strong>

    function getVisitorId() {

    function friendlyError(error, fallback = "暫時無法完成，請稍後再試。") {
      const message = String(error?.message || error || "");
      if (/idtoken expired|expired/i.test(message)) {
        return "LINE 登入憑證過期，請再按一次「登入」。";
      }
      if (/channel|client_id|LINE_LOGIN_CHANNEL_ID|LIFF/i.test(message)) {
        return "LINE 登入設定可能不一致，請確認 LIFF ID 與 Render 的 LINE Login Channel ID。";
      }
      if (/id token verify failed|line auth failed|line login failed|invalid_request/i.test(message)) {
        return "LINE 驗證失敗，請重新按「登入」；若仍失敗可能是 LIFF Channel 設定不一致。";
      }
      if (/not whitelisted|whitelist/i.test(message)) {
        return "這個 LINE 帳號尚未在白名單，請聯絡管理員開通。";
      }
      if (/admin only|403/i.test(message)) {
        return "這頁僅管理員可查看。";
      }
      if (/failed to fetch|network|connection/i.test(message)) {
        return "目前連線不穩，請稍後再試。";
      }
      if (/401|web command access denied|web session invalid/i.test(message)) {
        return "請先用白名單 LINE 帳號登入。";
      }
      return fallback;
    }

    async function getJson(url, options = {}) {
      const res = await fetch(url, { cache: "no-store", ...options });
      const payload = await res.json().catch(() => null);
      if (!res.ok) throw new Error(payload?.error || `${res.status} ${res.statusText}`);
      return payload;
    }

    function commandFetchOptions() {
      if (webSessionToken) return { headers: { "Authorization": `Bearer ${webSessionToken}` } };
      return legacyAccessToken ? { headers: { "X-Web-Access-Token": legacyAccessToken } } : {};
    }

    async function postJson(url, body) {
      const res = await fetch(url, {
        cache: "no-store",
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      const payload = await res.json().catch(() => null);
      if (!res.ok) throw new Error(payload?.error || `${res.status} ${res.statusText}`);
      return payload;
    }

    function setAuthState(label, signedIn = false) {
      $("authStatus").textContent = label;
      $("authButton").textContent = signedIn ? "登出" : "登入";
    }

    function storeSession(data) {
      webSessionToken = data.token || "";
      webUser = data.user || null;
      if (webSessionToken) localStorage.setItem("webSessionToken", webSessionToken);
      else localStorage.removeItem("webSessionToken");
      if (webUser) localStorage.setItem("webUser", JSON.stringify(webUser));
      else localStorage.removeItem("webUser");
      setAuthState(webUser?.name ? `已登入 ${webUser.name}` : "已登入", true);
    }

    function clearSession() {
      webSessionToken = "";
      webUser = null;
      localStorage.removeItem("webSessionToken");
      localStorage.removeItem("webUser");
      setAuthState(LIFF_ID ? "尚未登入 LINE" : "LIFF ID 未設定", false);
    }

    async function checkStoredSession() {
      if (!webSessionToken) {
        setAuthState(LIFF_ID ? "尚未登入 LINE" : "LIFF ID 未設定", false);
        return false;
      }
      try {
        const payload = await getJson(`${API_BASE}/auth/session`, commandFetchOptions());
        webUser = payload.data?.user || webUser;
        if (webUser) localStorage.setItem("webUser", JSON.stringify(webUser));
        setAuthState(webUser?.name ? `已登入 ${webUser.name}` : "已登入", true);
        return true;
      } catch (_error) {
        clearSession();
        return false;
      }
    }

    async function authenticateWithLine() {
      if (!LIFF_ID) {
        setAuthState("LIFF ID 未設定", false);
        throw new Error("LIFF ID is not configured");
      }
      if (!window.liff) throw new Error("LIFF SDK not loaded");
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: LIFF_REDIRECT_URI });
        return false;
      }
      const idToken = liff.getIDToken();
      if (!idToken) throw new Error("LINE idToken unavailable");
      let payload;
      try {
        payload = await postJson(`${API_BASE}/auth/line`, { id_token: idToken, liff_id: LIFF_ID });
      } catch (error) {
        if (/401|id token|line login failed|expired/i.test(String(error?.message || "")) && window.liff?.isLoggedIn?.()) {
          liff.logout();
        }
        throw error;
      }
      storeSession(payload.data || {});
      return true;
    }

    async function ensureAuth() {
      if (webSessionToken) return true;
      if (!LIFF_ID) return !webSessionToken;
      return authenticateWithLine();
    }

    const PUBLIC_TRIAL_COMMANDS = new Set(["2330", "台積電", "即時2330", "回測2330", "權證2330", "RS排名", "教學", "說明", "HELP"]);

      return String(command || "").trim().replace(/\s+/g, " ").toUpperCase();

    function compactCommand(command) {
      return normalizeCommand(command).replace(/\s+/g, "");

    function isPublicCommand(command) {
      return PUBLIC_TRIAL_COMMANDS.has(compactCommand(command));

    function mapStock(row) {
      const close = num(row.close);
      const p1 = num(row.p1, num(row.high_close, close * 1.06));
      const p2 = row.p2 == null ? null : num(row.p2);
      const boxLow = num(row.box_low, close * .94);
      const type = row.strategy_type || "START";
      return {
        raw: row,
        id: String(row.stock_id || ""),
        name: row.stock_name || String(row.stock_id || ""),
        type,
        signal: row.cross_status || row.detail || type,
        dataLabel: row.data_label || row.date || "",
        close,
        k: num(row.K),
        d: num(row.D),
        gap: num(row.gap),
        score: num(row.score),
        rs: row.rs_rank == null ? null : num(row.rs_rank),
        days: num(row.consecutive_days, 1),
        pattern: row.pattern_type || row.detail || type,
        detail: row.detail || "",
        entry: type === "CONT"
          ? `箱頂 ${row.box_high || "-"} 附近`
          : `${(close * .97).toFixed(1)}-${(close * .99).toFixed(1)}`,
        rr: row.rr_display || row.rr_ratio || "依原卡",
        stop: row.stop_loss || boxLow,
        p1,
        p2,
        flex: null,
        text: "",
        warrants: null
      };
    }

    function filteredStocks() {
      const q = $("searchInput").value.trim().toLowerCase();
      return stocks.filter(s => {
        const queryOk = !q || s.id.includes(q) || s.name.toLowerCase().includes(q);

          filter === "all" ||
          s.type === filter ||
          (filter === "rs90" && (s.rs || 0) >= 90) ||
          (filter === "repeat" && s.days >= 2);
        return queryOk && filterOk;
      });
    }

    function matchingStocks(query) {
      const q = query.trim().toLowerCase();
      if (!q) return [];
      return stocks.filter(s => s.id.includes(q) || s.name.toLowerCase().includes(q));
    }

    function requestedStock() {
      const q = $("searchInput").value.trim().toLowerCase();
      if (!q) return null;
      const exact = stocks.find(s => s.id === q || s.name.toLowerCase() === q);
      if (exact) return exact;
      const matches = matchingStocks(q);
      return matches.length === 1 ? matches[0] : null;
    }

    }

    function flexStyle(node = {}) {
      const css = [];
      if (node.backgroundColor) css.push(`background:${node.backgroundColor}`);
      if (node.color) css.push(`color:${node.color}`);
      if (node.paddingAll) css.push(`padding:${node.paddingAll}`);
      if (node.margin && node.margin !== "none") css.push("margin-top:6px");
      if (node.width) css.push(`width:${node.width}`);
      if (node.height) css.push(`height:${node.height}`);
      if (node.cornerRadius) css.push(`border-radius:${node.cornerRadius}`);
      if (node.borderColor) css.push(`border-color:${node.borderColor}`);
      if (node.borderWidth) css.push(`border-style:solid;border-width:${node.borderWidth}`);
      if (node.flex != null) css.push(node.flex === 0 ? "flex:0 0 auto" : `flex:${node.flex} 1 0`);
      if (node.align === "center") css.push("text-align:center");
      if (node.align === "end") css.push("text-align:right");
      return css.length ? ` style="${css.join(";")}"` : "";
    }

    function stockIdFromText(value) {
      const text = String(value || "");
      const matches = text.match(/\b\d{4}\b/g) || [];
      const stock = matches.find(id => !/^20\d{2}$/.test(id));
      return stock || "";
    }

    function stockIdFromUri(value) {
      const match = String(value || "").match(/\/quote\/(\d{4})(?:\.(?:TW|TWO))?/i);
      return match ? match[1] : "";
    }

    function actionKind(action = {}, label = "") {
      const text = action.text || "";
      const uri = action.uri || "";
      const haystack = `${label} ${text} ${uri}`;
      if (haystack.includes("K") || uri.includes("/technical-analysis")) return "chart";
      if (haystack.includes("權證")) return "warrant";
      if (haystack.includes("財報") || uri.includes("statementdog")) return "financial";
      if (haystack.includes("即時")) return "realtime";
      if (haystack.includes("回測")) return "backtest";
      if (haystack.includes("自選") || label.includes("+")) return "watch";
      return "link";
    }

    function actionAttrs(action = {}, label = "", fallbackSid = "") {
      const sid = stockIdFromText(action.text) || stockIdFromUri(action.uri) || fallbackSid;
      return `data-action="${actionKind(action, label)}" data-id="${html(sid)}" data-uri="${html(action.uri || "")}" data-text="${html(action.text || "")}"`;
    }

    function flexNode(node, sid = "") {
      if (!node) return "";
      if (node.type === "text") {
        const cls = ["flex-text", node.size || "xs", node.weight === "bold" ? "bold" : "", node.wrap ? "wrap" : ""].filter(Boolean).join(" ");
        return `<div class="${cls}"${flexStyle(node)}>${html(node.text)}</div>`;
      }
      if (node.type === "separator") return `<div style="border-top:1px solid var(--line);"></div>`;
      if (node.type === "button") {
        const action = node.action || {};
        const label = action.label || action.text || action.uri || "Action";
        const styles = [];
        if (node.style === "primary" && node.color) styles.push(`background:${node.color}`, `border-color:${node.color}`, "color:#fff");
        if (node.flex != null) styles.push(node.flex === 0 ? "flex:0 0 auto" : `flex:${node.flex} 1 0`);
        if (node.height === "sm") styles.push("min-height:34px");
        const styleAttr = styles.length ? ` style="${styles.join(";")}"` : flexStyle(node);
        return `<button class="card-button ${node.style === "primary" ? "primary" : ""}" ${actionAttrs(action, label, sid)}${styleAttr}>${html(label)}</button>`;
      }
      if (node.type === "box") {
        const contents = (node.contents || []).map(child => flexNode(child, sid)).join("");
        const actionable = node.action ? ` ${actionAttrs(node.action, "", sid)}` : "";
        return `<div class="flex-box ${node.layout || "vertical"}"${actionable}${flexStyle(node)}>${contents}</div>`;
      }
      if (node.type === "bubble") {
        return `<div class="line-card flex-card${selected?.id === sid ? " selected" : ""}" data-id="${html(sid)}">
          ${node.header ? flexNode(node.header, sid) : ""}
          ${node.body ? flexNode(node.body, sid) : ""}
          ${node.footer ? flexNode(node.footer, sid) : ""}
        </div>`;
      }
      return "";
    }

    function stockIdFromBubble(bubble) {
      const texts = [];
      const walk = node => {
        if (!node) return;
        if (node.type === "text" && node.text) texts.push(String(node.text));
        (node.contents || []).forEach(walk);
        if (node.header) walk(node.header);
        if (node.body) walk(node.body);
        if (node.footer) walk(node.footer);
      };
      walk(bubble);
      return stockIdFromText(texts.join(" "));

    async function loadCommand(command) {

      if (!text) return;
      setPageForCommand(text);
      if (!isPublicCommand(text)) {
        renderJoinLineBotPrompt(text);
        return;
      }
      try {
        const payload = await getJson(`${API_BASE}/command?text=${encodeURIComponent(text)}`, commandFetchOptions());
        rememberCommand(text);
        renderCommandPayload(text, payload.data || {});
        $("syncTitle").textContent = "已連線";
        $("syncMeta").textContent = payload.generated_at || "";
      } catch (error) {
        if (error.message.startsWith("401") && LIFF_ID) {
          clearSession();
          try {
            const ready = await authenticateWithLine();
            if (ready) return loadCommand(text);
            return;
          } catch (authError) {
            console.warn("[web auth]", authError);
            $("cardFeed").innerHTML = `<div class="message">${html(friendlyError(authError, "LINE 登入失敗，請重新登入。"))}</div>`;
            return;
          }

        const friendly = error.message.startsWith("401") ? friendlyError(error) : `查不到或暫時無法產生「${html(text)}」的小卡，請稍後再試。`;
        $("cardFeed").innerHTML = `<div class="message">${html(friendly)}</div>`;
        $("actionNotice").innerHTML = "";
      }
    }

    function drawChart() {
      const canvas = $("chart");
      if (!canvas || !selected) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, w, h);

      const rows = (kbarById.get(selected.id) || []).slice(-80).map(r => ({
        open: num(r.open), high: num(r.high), low: num(r.low), close: num(r.close)
      })).filter(r => r.high && r.low);

      if (!rows.length) {
        ctx.fillStyle = "#667085";
        ctx.font = "18px Microsoft JhengHei, Arial";
        ctx.fillText("尚未取得 K 線快取", 32, 52);
        return;
      }

      const max = Math.max(...rows.map(r => r.high), selected.p1 || 0, selected.p2 || 0);
      const min = Math.min(...rows.map(r => r.low), selected.stop || rows[0].low);
      const yOf = value => h - 28 - ((value - min) / Math.max(1, max - min)) * (h - 62);
      const step = (w - 60) / rows.length;
      const bodyW = Math.max(3, Math.min(8, step * .48));

      ctx.strokeStyle = "#e5e7eb";
      for (let i = 0; i < 5; i++) {
        const y = 28 + i * ((h - 60) / 4);
        ctx.beginPath();
        ctx.moveTo(28, y);
        ctx.lineTo(w - 22, y);
        ctx.stroke();
      }

      [[selected.stop, "#b42318"], [selected.p1, "#1d4ed8"], [selected.p2, "#6d28d9"]].forEach(([value, color]) => {
        if (!value) return;
        const y = yOf(value);
        ctx.setLineDash([6, 5]);
        ctx.strokeStyle = color;
        ctx.beginPath();
        ctx.moveTo(30, y);
        ctx.lineTo(w - 24, y);
        ctx.stroke();
        ctx.setLineDash([]);
      });

      rows.forEach((r, i) => {
        const x = 32 + i * step;
        const up = r.close >= r.open;
        ctx.strokeStyle = up ? "#b42318" : "#047857";
        ctx.fillStyle = up ? "#fee2e2" : "#dcfce7";
        ctx.beginPath();
        ctx.moveTo(x, yOf(r.high));
        ctx.lineTo(x, yOf(r.low));
        ctx.stroke();
        const top = yOf(Math.max(r.open, r.close));
        const bottom = yOf(Math.min(r.open, r.close));
        ctx.fillRect(x - bodyW / 2, top, bodyW, Math.max(3, bottom - top));
        ctx.strokeRect(x - bodyW / 2, top, bodyW, Math.max(3, bottom - top));
      });

      ctx.fillStyle = "#475467";
      ctx.font = "14px Microsoft JhengHei, Arial";
      ctx.fillText(`${selected.id} ${selected.name} / bot Kbar cache`, 30, 20);
    }

    function fmtBillion(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      return `${n.toLocaleString("zh-TW", { maximumFractionDigits: 1 })} 億`;
    }

    function fmtShares(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      if (Math.abs(n) >= 10000) return `${(n / 10000).toLocaleString("zh-TW", { maximumFractionDigits: 1 })}萬`;
      return n.toLocaleString("zh-TW");
    }

    function isTaiwanHolding(row = {}) {
      const stockId = String(row.stock_id || "").toUpperCase();
      return row.market === "台股" || /^\d{4}[A-Z]?$/.test(stockId);
    }

    function fmtShareUnit(value, row = {}, signed = false) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      const unitValue = isTaiwanHolding(row) ? n / 1000 : n;
      const sign = signed && unitValue > 0 ? "+" : "";
      const unit = isTaiwanHolding(row) ? "張" : "股";
      const digits = Math.abs(unitValue) >= 100 ? 0 : 1;
      return `${sign}${unitValue.toLocaleString("zh-TW", { maximumFractionDigits: digits })}${unit}`;
    }

    function fmtNumber(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      return n.toLocaleString("zh-TW", { maximumFractionDigits: 1 });
    }

    function fmtHolders(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n <= 1) return "待公布";
      return n.toLocaleString("zh-TW", { maximumFractionDigits: 0 });
    }

    function fmtSignedPct(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-%";
      const sign = n > 0 ? "+" : "";
      return `${sign}${n.toLocaleString("zh-TW", { maximumFractionDigits: 2 })}%`;
    }

    function fmtCloseChange(row = {}) {
      const close = fmtNumber(row.close_price);
      const pct = fmtSignedPct(row.change_rate);
      if (close === "-" && pct === "-%") return "收盤 -";
      if (pct === "-%") return `收盤 ${close}`;
      return `收盤 ${close} / ${pct}`;
    }

    function actionDeltaText(row = {}, kind = "added") {
      if (kind === "holdings") return `${row.weight ?? "-"}%`;
      const shares = Number(row.share_delta);
      if (Number.isFinite(shares) && shares !== 0) return fmtShareUnit(shares, row, true);
      if (Number.isFinite(shares) && shares === 0) return "股數未變";
      const weightDelta = Number(row.weight_delta);
      if (Number.isFinite(weightDelta)) return fmtSignedPct(weightDelta);
      return "-";
    }

    function actionDeltaSub(row = {}, kind = "added") {
      if (kind === "holdings") return "權重";
      const weightDelta = Number(row.weight_delta ?? row.weight);
      return Number.isFinite(weightDelta) ? `權重 ${fmtSignedPct(weightDelta)}` : "股數變化";
    }

    function stockMarketLabel(row = {}) {

      const market = row.market || (stockId.includes(".US") ? "美股" : (/^\d{4}[A-Z]?$/.test(stockId) ? "台股" : ""));
      const industry = row.industry || "";
      return [market, industry].filter(Boolean).join("・") || "未分類";
    }

    function changeNote(row = {}, kind = "added") {
      const map = {

        increased: "加碼持股",
        decreased: "減碼持股",
        holdings: `持有 ${fmtShareUnit(row.shares, row)}`
      };
      return map[kind] || "持股";
    }

    function listingAge(dateText) {
      if (!dateText) return "-";
      const date = new Date(String(dateText).replaceAll(".", "-").replaceAll("/", "-"));
      if (Number.isNaN(date.getTime())) return dateText;
      const days = Math.max(0, Math.round((Date.now() - date.getTime()) / 86400000));
      if (days < 60) return `上市 ${days} 天`;
      if (days < 730) return `上市約 ${Math.max(1, Math.round(days / 30))} 個月`;
      return `上市約 ${Math.round(days / 365)} 年`;
    }

    function etfFilterOk(etf) {
      const category = `${etf.category || ""} ${etf.manager_type || ""} ${etf.index_name || ""} ${etf.name || ""}`;
      if (activeEtfFilter === "active") return category.includes("主動");
      if (activeEtfFilter === "bond") return category.includes("債") || category.includes("息");
      if (activeEtfFilter === "highDividend") return category.includes("高股息") || category.includes("高息");
      if (activeEtfFilter === "stock") return category.includes("股票") || category.includes("權值") || category.includes("指數");
      return true;
    }

    function visibleActiveEtfs() {
      const q = activeEtfSearch.trim().toLowerCase();
      return activeEtfs.filter(etf => {
        const queryOk = !q || [etf.code, etf.name, etf.issuer, etf.category, etf.index_name].some(value => String(value || "").toLowerCase().includes(q));
        return queryOk && etfFilterOk(etf);
      });
    }

    function upcomingSortKey(etf = {}) {
      const date = String(etf.listingDate || "").match(/\d{4}-\d{2}-\d{2}/)?.[0]
        || String(etf.offeringPeriod || "").match(/\d{4}-\d{2}-\d{2}/)?.[0]
        || String(etf.preorderDate || "").match(/\d{4}-\d{2}-\d{2}/)?.[0]
        || "2099-12-31";
      return date;
    }

    function visibleUpcomingEtfs() {
      const q = activeEtfSearch.trim().toLowerCase();
      return [...upcomingEtfs]
        .filter(etf => !q || [etf.code, etf.name, etf.issuer, etf.market, etf.theme].some(value => String(value || "").toLowerCase().includes(q)))
        .sort((a, b) => upcomingSortKey(a).localeCompare(upcomingSortKey(b)));
    }

    function findUpcomingEtf(query) {
      const q = String(query || "").trim().toUpperCase();
      return upcomingEtfs.find(etf => String(etf.code).toUpperCase() === q || String(etf.name || "").includes(query));
    }

    function daysUntilText(dateText) {
      const raw = String(dateText || "").match(/\d{4}-\d{2}-\d{2}/)?.[0];
      if (!raw) return "TBA";
      const today = new Date(`${taipeiToday()}T00:00:00+08:00`);
      const target = new Date(`${raw}T00:00:00+08:00`);
      const days = Math.round((target - today) / 86400000);
      if (days < 0) return "已掛牌";
      if (days === 0) return "今日";
      return `${days} 天`;
    }

    function humanDate(dateText) {
      const raw = String(dateText || "").match(/\d{4}-\d{2}-\d{2}/)?.[0];
      if (!raw) return dateText || "待公告";
      const date = new Date(`${raw}T00:00:00+08:00`);
      const weekday = ["日", "一", "二", "三", "四", "五", "六"][date.getDay()];
      return `${date.getMonth() + 1}/${date.getDate()}（週${weekday}）`;
    }

    function taipeiToday() {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Taipei",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(new Date()).reduce((acc, part) => {
        acc[part.type] = part.value;
        return acc;
      }, {});
      return `${parts.year}-${parts.month}-${parts.day}`;
    }

    function firstValue(...values) {
      return values.find(value => value !== undefined && value !== null && value !== "");
    }

    function fmtPctValue(value, fallback = "待資料") {
      const n = Number(value);
      if (Number.isFinite(n)) return `${n.toLocaleString("zh-TW", { maximumFractionDigits: 2 })}%`;
      return String(value || fallback);
    }

    function fmtBillionSigned(value, fallback = "待資料") {
      const n = Number(value);
      if (!Number.isFinite(n)) return String(value || fallback);
      const sign = n > 0 ? "+" : "";
      return `${sign}${n.toLocaleString("zh-TW", { maximumFractionDigits: 1 })} 億`;
    }

    function etfDecisionMetrics(etf = {}) {
      return {
        flow5d: firstValue(etf.net_flow_5d_text, etf.net_flow_5d, etf.net_flow_5d_billion != null ? fmtBillionSigned(etf.net_flow_5d_billion) : "", etf.asset_delta_billion != null ? fmtBillionSigned(etf.asset_delta_billion) : "", "看詳情"),
        yield12m: firstValue(etf.yield_12m_text, etf.yield_12m != null ? fmtPctValue(etf.yield_12m) : "", "未公布"),
        expense: firstValue(etf.expense_ratio_text, etf.expense_ratio != null ? fmtPctValue(etf.expense_ratio) : "", "未公布"),
        premium: firstValue(etf.nav_premium_text, etf.nav_premium != null ? fmtPctValue(etf.nav_premium) : "", "未公布")
      };
    }

    function etfTrendSparkHtml(points = []) {
      const values = (points || []).map(point => Number(point.weight)).filter(Number.isFinite);
      if (values.length < 2) return "";
      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = Math.max(0.01, max - min);
      return `<div class="etf-spark">${values.map((value, index) => {
        const h = 18 + ((value - min) / range) * 62;
        return `<i class="${index === values.length - 1 || value >= values[Math.max(0, index - 1)] ? "up" : ""}" style="height:${Math.round(h)}%"></i>`;
      }).join("")}</div>`;
    }

    function etfAssetTrendText(etf = {}) {
      if (etf.asset_delta_state === "non_trading_day") return "非交易日，暫不判斷資金流";
      if (etf.asset_delta_state === "pending_previous") return "等待前後交易日快照";
      if (etf.asset_delta_state === "unchanged") return "較前次快照變化不明顯";
      if (etf.asset_delta_billion != null) return `較前次快照 ${fmtBillionSigned(etf.asset_delta_billion)}`;
      return "等待可用快照";
    }

    function parseYmd(value) {
      const match = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) return null;
      return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
    }

    function formatYmd(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function addDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() + days);
      return next;
    }

    function dividendCalendarGridHtml(events = [], data = {}) {
      const today = parseYmd(data.data_date) || new Date();
      const start = addDays(today, -today.getDay());
      const days = Math.max(42, Math.ceil(((data.days || 45) + today.getDay()) / 7) * 7);
      const eventMap = new Map();
      for (const event of events) {
        const key = event.ex_date;
        if (!key) continue;
        if (!eventMap.has(key)) eventMap.set(key, []);
        eventMap.get(key).push(event);
      }
      const headers = ["日", "一", "二", "三", "四", "五", "六"];
      const cells = Array.from({ length: days }, (_, index) => {
        const day = addDays(start, index);
        const key = formatYmd(day);
        const items = eventMap.get(key) || [];
        const classes = ["calendar-day"];
        if (day < today) classes.push("muted");
        if (key === formatYmd(today)) classes.push("today");
        return `<div class="${classes.join(" ")}" ${items[0]?.code ? `data-etf-code="${html(items[0].code)}"` : ""}><span class="calendar-date">${day.getDate()}</span>${items.slice(0, 3).map(item => `<button class="calendar-event" data-etf-code="${html(item.code)}" type="button">${html(item.code)} ${html(item.amount_text || "")}</button>`).join("")}${items.length > 3 ? `<span class="calendar-more">+${items.length - 3} 筆</span>` : ""}</div>`;
      }).join("");
      return `
        <div class="calendar-wrap">
          <div class="section-title">除息日曆 <span>${formatYmd(today)} 起 ${data.days || 45} 天</span></div>
          <div class="calendar-grid">
            ${headers.map(day => `<div class="head">${day}</div>`).join("")}
            ${cells}
          </div>
        </div>
      `;
    }

    function applyEtfFilterPreset(preset) {
      const presets = {
        highDividend: { preset, minAsset: 300, minYield: 4, maxExpense: 1, completeOnly: true },
        lowExpense: { preset, minAsset: 500, minYield: 0, maxExpense: 0.45, completeOnly: true },
        large: { preset, minAsset: 1000, minYield: 0, maxExpense: 1.5, completeOnly: false },
        active: { preset, minAsset: 0, minYield: 0, maxExpense: 2, completeOnly: false },
        all: { preset, minAsset: 0, minYield: 0, maxExpense: 2, completeOnly: false }
      };
      etfFilterSettings = { ...etfFilterSettings, ...(presets[preset] || presets.highDividend), query: etfFilterSettings.query || "" };
    }

    function advancedFilteredEtfs() {
      const s = etfFilterSettings;
      const q = String(s.query || "").trim().toLowerCase();
      return activeEtfs.filter(row => {
        const text = [row.code, row.name, row.issuer, row.category, row.manager_type, row.index_name].join(" ").toLowerCase();
        if (q && !text.includes(q)) return false;
        if (s.preset === "active" && !`${row.manager_type || ""} ${row.category || ""} ${row.name || ""}`.includes("主動")) return false;
        if (s.preset === "highDividend" && !`${row.category || ""} ${row.name || ""} ${row.index_name || ""}`.includes("高")) return false;
        if (s.completeOnly && (row.yield_12m == null || row.expense_ratio == null || row.nav_premium == null)) return false;
        if (Number(row.asset_size_billion || 0) < Number(s.minAsset || 0)) return false;
        if (row.yield_12m != null && Number(row.yield_12m) < Number(s.minYield || 0)) return false;
        if (row.yield_12m == null && Number(s.minYield || 0) > 0) return false;
        if (row.expense_ratio != null && Number(row.expense_ratio) > Number(s.maxExpense || 99)) return false;
        if (row.expense_ratio == null && s.completeOnly) return false;
        return true;
      }).slice(0, 40);
    }

    async function loadApp() {
      try {
        const [health, scans, cards, usage] = await Promise.allSettled([
          getJson(`${API_BASE}/health`),
          getJson(`${API_BASE}/scan-results`),
          getJson(`${API_BASE}/scan-cards`),
          getJson(usageUrl())
        ]);
        if (health.status !== "fulfilled") throw health.reason;
        if (scans.status !== "fulfilled") throw scans.reason;
        if (cards.status !== "fulfilled") throw cards.reason;
        stocks = (scans.value.data || []).map(mapStock);
        if (!stocks.length) throw new Error("scan-results empty");
        scanBubbles = [];
        (cards.value?.data?.flex_messages || []).forEach(message => {
          const bubbles = message?.contents?.contents || [];
          bubbles.forEach(bubble => {
            const id = stockIdFromBubble(bubble);
            if (id) scanBubbles.push({ id, bubble });
          });
        });
        if (!scanBubbles.length) throw new Error("scan-cards empty");
        selected = null;
        statusPayload = usage.status === "fulfilled" ? usage.value.data : null;
        renderUsageCount();
        $("syncTitle").textContent = "已連線";
        $("syncMeta").textContent = `${stocks.length} 檔 / ${scans.value.generated_at || ""}`;
        renderOriginalFeed();
      } catch (error) {
        stocks = [];
        selected = null;
        $("syncTitle").textContent = "API 失敗";
        $("syncMeta").textContent = error.message;
        $("cardFeed").innerHTML = `<div class="message">無法讀取原 bot API：${html(error.message)}。不顯示假資料，避免與 LINE 結果混淆。</div>`;
        renderStatus(error);
      }

      const menuView = event.target.closest("[data-menu-view]");
      if (menuView) {
        $("drawerOverlay").classList.remove("open");
        $("drawerOverlay").setAttribute("aria-hidden", "true");
        activate(menuView.dataset.menuView);
        if (menuView.dataset.menuView === "scanView") {
          $("searchInput").value = "";
          setPageForCommand("");
          renderWebHelp();
        }
        return;
      }

      const menuCommand = event.target.closest("[data-menu-command]");
      if (menuCommand) {
        $("drawerOverlay").classList.remove("open");
        $("drawerOverlay").setAttribute("aria-hidden", "true");
        $("searchInput").value = menuCommand.dataset.menuCommand;
        activate("scanView");
        await loadCommand(menuCommand.dataset.menuCommand);
        return;
      }

      const etfTab = event.target.closest("[data-etf-tab]");
      if (etfTab) {
        activeEtfTab = etfTab.dataset.etfTab;
        renderActiveEtfDetail();
        return;
      }

      const etfTool = event.target.closest("[data-etf-tool]");
      if (etfTool) {
        await renderEtfToolPage(etfTool.dataset.etfTool);
        return;
      }

      const comparePick = event.target.closest("[data-etf-compare-pick]");
      if (comparePick) {
        const code = normalizeEtfCode(comparePick.dataset.etfComparePick);
        setCompareCodes(etfCompareCodes.includes(code) ? etfCompareCodes.filter(item => item !== code) : [...etfCompareCodes, code]);
        await renderEtfComparePage();
        return;
      }

      const compareRemove = event.target.closest("[data-etf-compare-remove]");
      if (compareRemove) {
        setCompareCodes(etfCompareCodes.filter(code => code !== normalizeEtfCode(compareRemove.dataset.etfCompareRemove)));
        await renderEtfComparePage();
        return;
      }

      const compareAdd = event.target.closest("[data-etf-compare-add]");
      if (compareAdd) {
        const input = $("etfCompareInput");
        const code = normalizeEtfCode(input?.value || "");
        if (code) setCompareCodes([...etfCompareCodes, code]);
        await renderEtfComparePage();
        return;
      }

      const heatmapPick = event.target.closest("[data-etf-heatmap-pick]");
      if (heatmapPick) {
        const code = normalizeEtfCode(heatmapPick.dataset.etfHeatmapPick);
        setHeatmapCodes(etfHeatmapCodes.includes(code) ? etfHeatmapCodes.filter(item => item !== code) : [...etfHeatmapCodes, code]);
        await renderEtfHeatmapPage();
        return;
      }

      const heatmapRemove = event.target.closest("[data-etf-heatmap-remove]");
      if (heatmapRemove) {
        setHeatmapCodes(etfHeatmapCodes.filter(code => code !== normalizeEtfCode(heatmapRemove.dataset.etfHeatmapRemove)));
        await renderEtfHeatmapPage();
        return;
      }

      const heatmapAdd = event.target.closest("[data-etf-heatmap-add]");
      if (heatmapAdd) {
        const input = $("etfHeatmapInput");
        const code = normalizeEtfCode(input?.value || "");
        if (code) setHeatmapCodes([...etfHeatmapCodes, code]);
        await renderEtfHeatmapPage();
        return;
      }

      const flowPeriod = event.target.closest("[data-etf-flow-period]");
      if (flowPeriod) {
        etfFlowPeriod = flowPeriod.dataset.etfFlowPeriod || "1m";
        await renderEtfFlowPage();
        return;
      }

      const stockFlowPick = event.target.closest("[data-etf-stock-flow-pick]");
      if (stockFlowPick) {
        etfStockFlowId = normalizeStockFlowId(stockFlowPick.dataset.etfStockFlowPick) || "2330";
        await renderStockEtfFlowPage();
        return;
      }

      const stockFlowSearch = event.target.closest("[data-etf-stock-flow-search]");
      if (stockFlowSearch) {
        const input = $("etfStockFlowInput");
        const stockId = normalizeStockFlowId(input?.value || "");
        if (stockId) etfStockFlowId = stockId;
        await renderStockEtfFlowPage();
        return;
      }

      const holdingTrendPick = event.target.closest("[data-etf-holding-trend-pick]");
      if (holdingTrendPick) {
        etfHoldingTrendCode = normalizeEtfCode(holdingTrendPick.dataset.etfHoldingTrendPick) || "00919";
        await renderHoldingTrendPage();
        return;
      }

      const holdingTrendSearch = event.target.closest("[data-etf-holding-trend-search]");
      if (holdingTrendSearch) {
        const input = $("etfHoldingTrendInput");
        const code = normalizeEtfCode(input?.value || "");
        if (code) etfHoldingTrendCode = code;
        await renderHoldingTrendPage();
        return;
      }

      const filterPreset = event.target.closest("[data-etf-filter-preset]");
      if (filterPreset) {
        applyEtfFilterPreset(filterPreset.dataset.etfFilterPreset);
        await renderEtfFilterPage();
        return;
      }

      const filterClear = event.target.closest("[data-etf-filter-clear]");
      if (filterClear) {
        etfFilterSettings.query = "";
        await renderEtfFilterPage();
        return;
      }

      const upcomingList = event.target.closest("[data-upcoming-list]");
      if (upcomingList) {
        renderUpcomingEtfListPage();
        return;
      }

      const etfStock = event.target.closest("[data-etf-stock]");
      if (etfStock) {
        await loadEtfOverlap(etfStock.dataset.etfStock, etfStock.dataset.etfStockName);
        return;
      }

      const upcomingEtf = event.target.closest("[data-upcoming-etf-code]");
      if (upcomingEtf) {
        renderUpcomingEtfDetail(upcomingEtf.dataset.upcomingEtfCode);
        return;
      }

      const etfRow = event.target.closest("[data-etf-code]");
      if (etfRow) {
        await loadActiveEtfDetail(etfRow.dataset.etfCode);
        return;
      }

      const pick = event.target.closest("[data-pick-id]");
      if (pick) {
        $("searchInput").value = pick.dataset.pickId;
        renderOriginalFeed();
        return;
      }

      const helpCommand = event.target.closest("[data-help-command]");
      if (helpCommand) {
        await runHelpCommand(helpCommand.dataset.helpCommand);
        return;
      }

      const copy = event.target.closest("[data-copy]");
      if (copy) {
        await navigator.clipboard?.writeText(copy.dataset.copy);
        copy.textContent = "已複製";
        return;
      }

      const nav = event.target.closest("[data-view]");
      if (nav) {
        activate(nav.dataset.view);
        return;
      }

      const action = event.target.closest("[data-action]");
      if (action) {
        event.preventDefault();
        const id = action.dataset.id;
        if (id && selected?.id !== id) selected = stocks.find(s => s.id === id) || selected;
        const type = action.dataset.action;
        if (type === "external" && action.dataset.url) { window.open(action.dataset.url, "_blank", "noopener"); return; }
        if (action.dataset.uri) { window.open(action.dataset.uri, "_blank", "noopener"); return; }
        if (action.dataset.text) {
          $("searchInput").value = action.dataset.text;
          $("cardFeed").innerHTML = `<div class="message">正在讀取 ${html(action.dataset.text)} 的 LINE 小卡...</div>`;
          await loadCommand(action.dataset.text);
          return;
        }
        if (type === "chart" && id) { await selectStock(id, "chartView"); return; }
        if (type === "financial") { window.open(`https://statementdog.com/analysis/${id}`, "_blank", "noopener"); return; }
      }

      const card = event.target.closest(".line-card");
      if (card?.dataset.id) {
        $("searchInput").value = card.dataset.id;
        renderOriginalFeed();
      }
    });

    checkStoredSession().finally(loadApp);
  </script>
</body>
</html>
