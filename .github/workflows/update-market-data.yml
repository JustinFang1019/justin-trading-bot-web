name: Update market snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "45 9 * * 1-5"

permissions:
  contents: write

jobs:
  update:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch TWSE and TPEX data
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts\fetch-real-market-data.ps1
          powershell -ExecutionPolicy Bypass -File scripts\fetch-kbar-snapshot.ps1

      - name: Commit snapshot
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-snapshot.json data/kbar-snapshot.json
          if (git diff --cached --quiet) {
            Write-Host "No market snapshot changes."
          } else {
            git commit -m "Update market snapshot"
            git push
          }
